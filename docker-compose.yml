services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: temporal_mini
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - wflow-net

  app1:
    image: temporal-mini:latest
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/temporal_mini
      DB_USER: postgres
      DB_PASS: postgres
      INSTANCE_URL: http://app1:8080
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wflow-net

  app2:
    image: temporal-mini:latest
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/temporal_mini
      DB_USER: postgres
      DB_PASS: postgres
      INSTANCE_URL: http://app2:8080
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wflow-net

  app3:
    image: temporal-mini:latest
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/temporal_mini
      DB_USER: postgres
      DB_PASS: postgres
      INSTANCE_URL: http://app3:8080
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wflow-net

networks:
  wflow-net:
    driver: bridge

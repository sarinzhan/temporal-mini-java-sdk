spring.application.name=temporal-mini

# DataSource (overridden via env in Docker)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/temporal_mini}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none

# Instance URL for multi-instance coordination (set via INSTANCE_URL env)
workflow.instance.url=${INSTANCE_URL:}

workflow.scheduler.interval-ms=2000
workflow.scheduler.pool-size=4
workflow.scheduler.queue-capacity=50

spring.application.name=workflow

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/workflow}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

workflow.worker-pool-size=4
workflow.poll-interval-ms=1000
workflow.lock-timeout-seconds=60
# How often a worker renews the lease of tasks it is processing. Must be well below
# lock-timeout-seconds so several renewals fit inside one lock window.
workflow.lease-renew-interval-ms=20000
workflow.retry-poll-interval-ms=2000
workflow.timeout-watcher-interval-ms=5000

# Metrics rollup: a snapshot row is written to wflow.metrics_snapshot every interval-ms and,
# if a Micrometer registry is on the classpath, the same numbers are published as meters.
workflow.metrics.enabled=${WORKFLOW_METRICS_ENABLED:true}
workflow.metrics.interval-ms=${WORKFLOW_METRICS_INTERVAL_MS:15000}
workflow.metrics.retention-hours=${WORKFLOW_METRICS_RETENTION_HOURS:168}

workflow.instance.id=${INSTANCE_ID:default}
workflow.instance.internal-url=${INSTANCE_INTERNAL_URL:}
workflow.instance.external-url=${INSTANCE_EXTERNAL_URL:}
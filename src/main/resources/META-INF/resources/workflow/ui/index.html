<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>temporal·lite — Workflow Console</title>
  <style>
/* temporal-lite console — theme tokens + layout */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

:root {
  --sans: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* default: Slate (cool dark) */
  --bg: #0c0e12;
  --panel: #12151b;
  --panel-2: #161a22;
  --panel-3: #1b2029;
  --border: #232932;
  --border-soft: #1b2029;
  --text: #e4e8ef;
  --text-dim: #9aa4b2;
  --text-faint: #5d6675;
  --accent: oklch(0.72 0.13 162);
  --accent-ink: #04130d;
  --row-hover: #171c24;
  --row-sel: #1a2733;

  /* semantic status (constant across themes) */
  --st-running: oklch(0.72 0.13 232);
  --st-retrying: oklch(0.80 0.13 78);
  --st-completed: oklch(0.74 0.13 158);
  --st-failed: oklch(0.68 0.17 22);
  --st-timeout: oklch(0.73 0.15 48);
  --st-pending: oklch(0.66 0.02 250);
  --st-cancelled: oklch(0.66 0.08 300);
}

[data-theme="carbon"] {
  --bg: #0b0b0d;
  --panel: #141416;
  --panel-2: #18181b;
  --panel-3: #1e1e22;
  --border: #2a2a2e;
  --border-soft: #1f1f23;
  --text: #e8e8ea;
  --text-dim: #9a9aa0;
  --text-faint: #5c5c63;
  --accent: oklch(0.72 0.12 256);
  --accent-ink: #06101c;
  --row-hover: #1a1a1e;
  --row-sel: #20232b;
}
[data-theme="terminal"] {
  --bg: #060a07;
  --panel: #0a110c;
  --panel-2: #0d160f;
  --panel-3: #112016;
  --border: #1c2e21;
  --border-soft: #142319;
  --text: #c8f0d2;
  --text-dim: #6fae84;
  --text-faint: #3e6b4e;
  --accent: oklch(0.82 0.18 145);
  --accent-ink: #04140a;
  --row-hover: #0e1a12;
  --row-sel: #122819;
}
[data-theme="midnight"] {
  --bg: #0a0c16;
  --panel: #10131f;
  --panel-2: #141826;
  --panel-3: #191e30;
  --border: #242a3f;
  --border-soft: #1b2032;
  --text: #e3e6f3;
  --text-dim: #969db8;
  --text-faint: #5a6080;
  --accent: oklch(0.70 0.15 285);
  --accent-ink: #0c0820;
  --row-hover: #161a2a;
  --row-sel: #1d2540;
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { height: 100vh; }

/* density */
:root { --row-py: 9px; --cell-fs: 12.5px; --pad: 16px; }
[data-density="compact"] { --row-py: 6px; --cell-fs: 12px; --pad: 12px; }
[data-density="ultra"] { --row-py: 3.5px; --cell-fs: 11.5px; --pad: 10px; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

.mono { font-family: var(--mono); font-feature-settings: 'zero' 1; }
.dim { color: var(--text-dim); }
.faint { color: var(--text-faint); }

/* ---------- app shell ---------- */
.app { display: grid; grid-template-columns: 212px 1fr; height: 100vh; }

.sidebar {
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 0;
}
.brand { display: flex; align-items: center; gap: 9px; padding: 15px 16px; border-bottom: 1px solid var(--border-soft); }
.brand-mark { width: 22px; height: 22px; border-radius: 5px; background: var(--accent);
  display: grid; place-items: center; flex: none; }
.brand-mark span { color: var(--accent-ink); font-weight: 700; font-size: 13px; font-family: var(--mono); }
.brand-name { font-weight: 600; letter-spacing: -0.01em; font-size: 13.5px; }
.brand-name b { color: var(--accent); font-weight: 600; }
.brand-sub { font-size: 10px; color: var(--text-faint); font-family: var(--mono); letter-spacing: 0.04em; }

.nav { padding: 8px; display: flex; flex-direction: column; gap: 2px; }
.nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint);
  padding: 12px 10px 5px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 6px;
  color: var(--text-dim); cursor: pointer; font-size: 12.5px; font-weight: 500; user-select: none;
  border: 1px solid transparent; }
.nav-item:hover { background: var(--row-hover); color: var(--text); }
.nav-item.active { background: var(--panel-3); color: var(--text); border-color: var(--border); }
.nav-item .ic { width: 15px; height: 15px; flex: none; opacity: 0.85; }
.nav-item.active .ic { color: var(--accent); opacity: 1; }
.nav-item .count { margin-left: auto; font-family: var(--mono); font-size: 10.5px; color: var(--text-faint);
  background: var(--panel-2); padding: 1px 6px; border-radius: 9px; border: 1px solid var(--border-soft); }
.nav-item.active .count { color: var(--text-dim); }
.sidebar-foot { margin-top: auto; padding: 12px 14px; border-top: 1px solid var(--border-soft);
  font-size: 10.5px; color: var(--text-faint); font-family: var(--mono); display: flex; flex-direction: column; gap: 5px; }

/* ---------- main ---------- */
.main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
.topbar { display: flex; align-items: center; gap: 14px; padding: 11px var(--pad);
  border-bottom: 1px solid var(--border); background: var(--panel); flex: none; }
.topbar h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
.topbar .crumb { color: var(--text-faint); font-weight: 400; }
.spacer { flex: 1; }

.live { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 11px;
  color: var(--text-dim); padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--panel-2); cursor: pointer; user-select: none; }
.live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); }
.live.on .dot { background: var(--st-completed); box-shadow: 0 0 0 0 var(--st-completed); animation: pulse 1.6s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--st-completed) 60%, transparent); }
  70% { box-shadow: 0 0 0 6px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
.live.on { color: var(--text); border-color: color-mix(in oklch, var(--st-completed) 40%, var(--border)); }

.poll { display: flex; align-items: center; gap: 8px; }
.poll.off { opacity: 0.45; }
.poll-l { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); }
.poll-v { font-size: 11px; color: var(--text-dim); min-width: 22px; text-align: right; }
.poll input[type=range] { -webkit-appearance: none; appearance: none; width: 88px; height: 4px; border-radius: 3px;
  background: var(--panel-3); cursor: pointer; }
.poll input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: var(--accent); border: 2px solid var(--panel); cursor: pointer; }
.poll input[type=range]::-moz-range-thumb { width: 13px; height: 13px; border-radius: 50%; background: var(--accent);
  border: 2px solid var(--panel); cursor: pointer; }

.btn { font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--text-dim);
  background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 11px;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--panel-3); color: var(--text); }
.btn .ic { width: 14px; height: 14px; }

/* ---------- toolbar / filters ---------- */
.toolbar { display: flex; align-items: center; gap: 8px; padding: 9px var(--pad);
  border-bottom: 1px solid var(--border-soft); background: var(--panel); flex: none; flex-wrap: wrap; }
.search { display: flex; align-items: center; gap: 7px; background: var(--panel-2); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 9px; min-width: 230px; }
.search input { background: none; border: none; outline: none; color: var(--text); font-family: var(--mono);
  font-size: 12px; width: 100%; }
.search input::placeholder { color: var(--text-faint); }
.search .ic { width: 14px; height: 14px; color: var(--text-faint); flex: none; }
.search kbd { font-family: var(--mono); font-size: 10px; color: var(--text-faint); border: 1px solid var(--border);
  border-radius: 3px; padding: 0 4px; }

.chips { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.chip { font-size: 11px; font-family: var(--mono); padding: 4px 9px; border-radius: 20px; cursor: pointer;
  border: 1px solid var(--border); color: var(--text-dim); background: var(--panel-2); user-select: none;
  display: inline-flex; align-items: center; gap: 5px; }
.chip:hover { color: var(--text); border-color: var(--text-faint); }
.chip.on { color: var(--text); background: var(--panel-3); border-color: var(--text-faint); }
.chip .sw { width: 7px; height: 7px; border-radius: 50%; }
.sel { font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; cursor: pointer; }
.sel:focus { outline: none; border-color: var(--text-faint); }
.tb-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); }

/* custom filter dropdowns */
.dd { position: relative; }
.dd-trigger { display: inline-flex; align-items: center; gap: 8px; background: var(--panel-2);
  border: 1px solid var(--border); border-radius: 7px; padding: 5px 9px; cursor: pointer; height: 30px;
  font-family: var(--sans); color: var(--text-dim); }
.dd-trigger:hover { background: var(--panel-3); color: var(--text); }
.dd-trigger.open { border-color: var(--text-faint); background: var(--panel-3); }
.dd-trigger.active { border-color: color-mix(in oklch, var(--accent) 55%, var(--border)); color: var(--text); }
.dd-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); }
.dd-trigger.active .dd-label { color: color-mix(in oklch, var(--accent) 90%, var(--text)); }
.dd-summary { font-size: 12px; font-weight: 500; font-family: var(--mono); white-space: nowrap; }
.dd-caret { font-size: 9px; color: var(--text-faint); margin-left: -2px; }
.dd-panel { position: absolute; top: calc(100% + 6px); left: 0; z-index: 35; background: var(--panel);
  border: 1px solid var(--border); border-radius: 9px; box-shadow: 0 16px 44px rgba(0,0,0,0.5);
  padding: 6px; animation: ddpop 0.13s ease; overflow: hidden; }
.dd-panel.right { left: auto; right: 0; }
@keyframes ddpop { from { opacity: 0; transform: translateY(-4px); } }
.dd-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px 8px;
  font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint);
  border-bottom: 1px solid var(--border-soft); margin-bottom: 4px; }
.dd-clear { background: none; border: none; color: var(--accent); font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; padding: 0; }
.dd-clear:hover { text-decoration: underline; }
.dd-opts { display: flex; flex-direction: column; gap: 1px; max-height: 280px; overflow: auto; }
.dd-opt { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 6px; cursor: pointer;
  background: none; border: none; color: var(--text-dim); font-family: var(--sans); font-size: 12.5px; text-align: left; width: 100%; }
.dd-opt:hover { background: var(--row-hover); color: var(--text); }
.dd-opt.on { color: var(--text); }
.dd-check { width: 15px; height: 15px; flex: none; border: 1px solid var(--border); border-radius: 4px;
  display: grid; place-items: center; color: var(--accent-ink); }
.dd-check.on { background: var(--accent); border-color: var(--accent); }
.dd-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.dd-optl { flex: 1 1 auto; min-width: 0; font-family: var(--mono); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dd-empty { padding: 10px 8px; color: var(--text-faint); font-family: var(--mono); font-size: 11px; }
.dd-custom { border-top: 1px solid var(--border-soft); margin-top: 5px; padding: 9px 8px 5px;
  display: flex; flex-direction: column; gap: 9px; }
.dr-field { display: flex; flex-direction: column; gap: 4px; font-family: var(--mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); }
.dr-field input { background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text);
  font-family: var(--mono); font-size: 12px; padding: 6px 8px; color-scheme: dark; width: 100%; }
.dr-field input:focus { outline: none; border-color: var(--text-faint); }

.btn.reset { color: var(--text-dim); }
.btn.reset.off { opacity: 0.38; cursor: default; }
.btn.reset:not(.off):hover { color: var(--st-failed); border-color: color-mix(in oklch, var(--st-failed) 40%, var(--border)); }

/* ---------- table ---------- */
.tablewrap { flex: 1; overflow: auto; min-height: 0; }
table.grid { width: 100%; border-collapse: collapse; font-size: var(--cell-fs); }
table.grid thead th { position: sticky; top: 0; z-index: 2; background: var(--panel);
  text-align: left; font-weight: 500; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-faint); padding: 8px var(--pad); border-bottom: 1px solid var(--border);
  white-space: nowrap; cursor: pointer; user-select: none; }
table.grid thead th:hover { color: var(--text-dim); }
table.grid thead th .arr { opacity: 0.7; margin-left: 3px; }
table.grid tbody td { padding: var(--row-py) var(--pad); border-bottom: 1px solid var(--border-soft);
  white-space: nowrap; vertical-align: middle; }
table.grid tbody tr { cursor: pointer; }
table.grid tbody tr:hover { background: var(--row-hover); }
table.grid tbody tr.sel { background: var(--row-sel); }
table.grid tbody tr.sel td:first-child { box-shadow: inset 2px 0 0 var(--accent); }
.cellmono { font-family: var(--mono); }
.actname { font-weight: 600; color: var(--text); }
.wfref { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.wfref b { color: var(--text-dim); font-weight: 500; }
.muted-id { color: var(--text-faint); font-family: var(--mono); font-size: 11px; }
.qtag { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); background: var(--panel-2);
  border: 1px solid var(--border-soft); border-radius: 4px; padding: 1px 6px; }
.attempt-pill { font-family: var(--mono); font-size: 11px; }
.attempt-pill.warn { color: var(--st-retrying); }
.attempt-pill.bad { color: var(--st-failed); }
.dur-bar { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); }
.dur-bar .track { width: 46px; height: 4px; border-radius: 2px; background: var(--panel-3); overflow: hidden; }
.dur-bar .fill { height: 100%; border-radius: 2px; }

/* status badge */
.sb { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px;
  font-weight: 500; padding: 2px 8px 2px 7px; border-radius: 5px; white-space: nowrap;
  border: 1px solid color-mix(in oklch, var(--c) 35%, transparent);
  color: var(--c); background: color-mix(in oklch, var(--c) 12%, transparent); }
.sb .d { width: 6px; height: 6px; border-radius: 50%; background: var(--c); flex: none; }
.sb.spin .d { animation: blink 1.1s steps(2) infinite; }
@keyframes blink { 50% { opacity: 0.3; } }

/* ---------- detail panel ---------- */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 40; }
.detail { background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column;
  min-height: 0; }
.detail.panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(560px, 90vw); z-index: 41;
  box-shadow: -24px 0 60px rgba(0,0,0,0.4); animation: slidein 0.18s ease; }
@keyframes slidein { from { transform: translateX(24px); opacity: 0.6; } }
.detail-head { padding: 14px var(--pad); border-bottom: 1px solid var(--border); flex: none; }
.detail-title { display: flex; align-items: center; gap: 10px; }
.detail-title h2 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
.detail-meta { display: flex; gap: 14px; margin-top: 9px; flex-wrap: wrap; font-family: var(--mono); font-size: 11px;
  color: var(--text-faint); }
.detail-meta b { color: var(--text-dim); font-weight: 500; }
.detail-body { overflow: auto; flex: 1; min-height: 0; }
.x { margin-left: auto; cursor: pointer; color: var(--text-faint); width: 26px; height: 26px;
  display: grid; place-items: center; border-radius: 6px; }
.x:hover { background: var(--panel-3); color: var(--text); }

.section { border-bottom: 1px solid var(--border-soft); padding: 14px var(--pad); }
.section-h { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-faint);
  margin: 0 0 11px; display: flex; align-items: center; gap: 8px; }
.section-h .n { color: var(--text-dim); font-family: var(--mono); }

.kv { display: grid; grid-template-columns: 120px 1fr; gap: 7px 14px; font-size: 12px; }
.kv dt { color: var(--text-faint); font-family: var(--mono); font-size: 11px; }
.kv dd { margin: 0; color: var(--text); font-family: var(--mono); font-size: 11.5px; word-break: break-word; }

/* attempts list */
.attempts { display: flex; flex-direction: column; gap: 0; }
.attempt { display: grid; grid-template-columns: 22px 1fr; gap: 10px; position: relative; padding-bottom: 14px; }
.attempt:last-child { padding-bottom: 0; }
.attempt .rail { display: flex; flex-direction: column; align-items: center; }
.attempt .node { width: 13px; height: 13px; border-radius: 50%; border: 2px solid var(--c); background: var(--bg);
  margin-top: 2px; flex: none; z-index: 1; }
.attempt .node.fill { background: var(--c); }
.attempt .line { width: 2px; flex: 1; background: var(--border); margin: 3px 0 -3px; }
.attempt .body { min-width: 0; }
.attempt .row1 { display: flex; align-items: baseline; gap: 9px; }
.attempt .row1 .att { font-family: var(--mono); font-weight: 600; font-size: 12px; }
.attempt .row1 .t { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); margin-left: auto; }
.attempt .err { margin-top: 6px; font-family: var(--mono); font-size: 11px; color: var(--st-failed);
  background: color-mix(in oklch, var(--st-failed) 9%, transparent);
  border: 1px solid color-mix(in oklch, var(--st-failed) 22%, transparent);
  border-radius: 5px; padding: 6px 8px; white-space: pre-wrap; word-break: break-word; }
.attempt .retrymeta { margin-top: 5px; font-family: var(--mono); font-size: 10.5px; color: var(--st-retrying); }

/* json viewer */
.json { font-family: var(--mono); font-size: 11.5px; line-height: 1.55; background: var(--bg);
  border: 1px solid var(--border); border-radius: 7px; padding: 11px 12px; overflow: auto; max-height: 280px;
  white-space: pre; color: var(--text-dim); }
.json .k { color: var(--accent); }
.json .s { color: var(--st-completed); }
.json .n { color: var(--st-running); }
.json .b { color: var(--st-retrying); }
.json .null { color: var(--text-faint); }
.payload-tabs { display: flex; gap: 4px; margin-bottom: 9px; }
.payload-tabs .pt { font-family: var(--mono); font-size: 11px; padding: 4px 10px; border-radius: 5px;
  cursor: pointer; color: var(--text-dim); border: 1px solid transparent; }
.payload-tabs .pt:hover { color: var(--text); }
.payload-tabs .pt.on { background: var(--panel-3); border-color: var(--border); color: var(--text); }

/* event timeline (in detail) */
.evlog { display: flex; flex-direction: column; }
.evrow { display: grid; grid-template-columns: 78px 18px 1fr; gap: 10px; align-items: start;
  padding: 5px 0; font-family: var(--mono); font-size: 11px; }
.evrow .ts { color: var(--text-faint); font-size: 10.5px; padding-top: 1px; }
.evrow .gut { display: flex; flex-direction: column; align-items: center; }
.evrow .gut .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--c); margin-top: 4px; flex: none; }
.evrow .gut .ln { width: 2px; flex: 1; background: var(--border-soft); min-height: 8px; margin: 2px 0 -5px; }
.evrow:last-child .gut .ln { display: none; }
.evrow .et { color: var(--text); }
.evrow .ed { color: var(--text-faint); margin-top: 1px; word-break: break-word; white-space: pre-wrap; }

/* empty / banners */
.empty { display: grid; place-items: center; height: 100%; color: var(--text-faint); text-align: center; gap: 8px; }
.empty .ic { width: 30px; height: 30px; opacity: 0.5; }
.banner { display: flex; align-items: flex-start; gap: 9px; margin: var(--pad); padding: 11px 13px;
  border: 1px dashed color-mix(in oklch, var(--st-retrying) 40%, var(--border)); border-radius: 8px;
  background: color-mix(in oklch, var(--st-retrying) 7%, transparent); color: var(--text-dim); font-size: 12px; }
.banner .ic { width: 16px; height: 16px; color: var(--st-retrying); flex: none; margin-top: 1px; }
.banner code { font-family: var(--mono); color: var(--text); background: var(--panel-2); padding: 1px 5px;
  border-radius: 4px; font-size: 11px; }

/* stat cards */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(128px, 1fr)); gap: 1px;
  background: var(--border-soft); border-bottom: 1px solid var(--border); flex: none; }
.stat { background: var(--panel); padding: 12px var(--pad); }
.stat .label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); }
.stat .val { font-family: var(--mono); font-size: 22px; font-weight: 600; margin-top: 3px; letter-spacing: -0.02em; }
.stat .val small { font-size: 12px; color: var(--text-faint); font-weight: 400; }
.stat .spark { display: flex; align-items: flex-end; gap: 2px; height: 18px; margin-top: 6px; }
.stat .spark i { flex: 1; background: var(--accent); opacity: 0.5; border-radius: 1px; min-height: 2px; }

/* worker cards */
.workers { padding: var(--pad); display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;
  overflow: auto; }
.wcard { background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; padding: 13px 14px; }
.wcard .wh { display: flex; align-items: center; gap: 8px; min-width: 0; }
.wcard .wh .name { font-family: var(--mono); font-weight: 600; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wcard .wq { display: flex; gap: 4px; flex-wrap: wrap; margin: 10px 0; }
.wcard .load { height: 6px; background: var(--panel-3); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.wcard .load i { display: block; height: 100%; background: var(--accent); border-radius: 3px; }
.wcard .wmeta { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10.5px;
  color: var(--text-faint); margin-top: 9px; }

/* ---------- workflow modal ---------- */
.wfm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
  z-index: 50; display: grid; place-items: center; padding: 4vh 24px; animation: fade 0.16s ease; }
@keyframes fade { from { opacity: 0; } }
.wfm { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  width: min(1060px, 96vw); max-height: 92vh; display: flex; flex-direction: column; min-height: 0;
  box-shadow: 0 30px 90px rgba(0,0,0,0.55); animation: pop 0.18s cubic-bezier(.2,.8,.2,1); overflow: hidden; }
@keyframes pop { from { transform: translateY(10px) scale(0.99); opacity: 0.4; } }
.wfm-head { padding: 16px var(--pad) 13px; border-bottom: 1px solid var(--border); flex: none; }
.wfm-titlerow { display: flex; align-items: center; gap: 11px; }
.wfm-titlerow h2 { margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
.wfm-id { font-family: var(--mono); color: var(--text-faint); font-size: 13px; }
.wfm-sub { display: flex; gap: 18px; margin-top: 10px; color: var(--text-faint); font-size: 11px; }
.wfm-sub span { display: inline-flex; align-items: center; gap: 5px; }
.wfm-sub .ic { width: 12px; height: 12px; opacity: 0.8; }

.wfm-fields { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border-soft);
  border-bottom: 1px solid var(--border); flex: none; }
.wfm-field { background: var(--panel); padding: 10px var(--pad); }
.wfm-fl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); }
.wfm-fv { margin-top: 4px; font-size: 12.5px; color: var(--text); }
.wfm-fv.mono { font-family: var(--mono); font-size: 12px; }
.wfm-err { display: flex; align-items: center; gap: 8px; padding: 9px var(--pad); flex: none;
  color: var(--st-failed); font-size: 11.5px; background: color-mix(in oklch, var(--st-failed) 9%, transparent);
  border-bottom: 1px solid var(--border-soft); }
.wfm-err .ic { flex: none; }

.wfm-tabs { display: flex; gap: 2px; padding: 0 8px; border-bottom: 1px solid var(--border); flex: none;
  background: var(--panel); }
.wfm-tab { font-family: var(--sans); font-size: 12.5px; font-weight: 500; color: var(--text-dim);
  background: none; border: none; border-bottom: 2px solid transparent; padding: 11px 13px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 7px; margin-bottom: -1px; }
.wfm-tab:hover { color: var(--text); }
.wfm-tab.on { color: var(--text); border-bottom-color: var(--accent); }
.wfm-tab .n { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint);
  background: var(--panel-3); border: 1px solid var(--border-soft); border-radius: 9px; padding: 0 6px; }
.wfm-tab.on .n { color: var(--text-dim); }
.wfm-tab .ic { opacity: 0.85; }
.wfm-body { overflow: auto; flex: 1; min-height: 0; padding: var(--pad); }

/* ---------- gantt ---------- */
.gantt { font-family: var(--mono); }
.gantt-axis { display: grid; grid-template-columns: 210px 1fr; gap: 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border); margin-bottom: 4px; position: sticky; top: calc(-1 * var(--pad));
  background: var(--panel); z-index: 2; }
.gantt-axhead { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint);
  align-self: end; }
.gantt-axtrack { position: relative; height: 16px; }
.gantt-tick { position: absolute; top: 0; transform: translateX(-50%); }
.gantt-tick:first-child { transform: none; }
.gantt-ticklbl { font-size: 10px; color: var(--text-faint); white-space: nowrap; }
.gantt-rows { display: flex; flex-direction: column; }
.gantt-row { display: grid; grid-template-columns: 210px 1fr; gap: 14px; align-items: center;
  padding: 7px 0; cursor: pointer; border-radius: 5px; }
.gantt-row:hover { background: var(--row-hover); }
.gantt-row.open { background: var(--row-sel); }
.gantt-label { display: flex; align-items: center; gap: 8px; min-width: 0; padding-left: 4px; }
.gl-seq { width: 18px; height: 18px; flex: none; display: grid; place-items: center; font-size: 10px;
  color: var(--text-faint); background: var(--panel-3); border-radius: 4px; }
.gl-name { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gl-att { font-size: 10.5px; color: var(--st-retrying); flex: none; }
.gantt-track { position: relative; height: 22px; background: var(--bg); border-radius: 5px; overflow: hidden;
  border: 1px solid var(--border-soft); }
.gantt-grid { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border-soft); opacity: 0.6; }
.gantt-seg { position: absolute; top: 3px; height: 16px; border-radius: 3px; min-width: 3px;
  background: color-mix(in oklch, var(--c) 78%, transparent); border: 1px solid var(--c); box-sizing: border-box; }
.gantt-seg.live { background: repeating-linear-gradient(45deg,
  color-mix(in oklch, var(--c) 60%, transparent) 0 6px, color-mix(in oklch, var(--c) 30%, transparent) 6px 12px);
  animation: slide 0.7s linear infinite; }
@keyframes slide { from { background-position: 0 0; } to { background-position: 17px 0; } }
.gantt-gap { position: absolute; top: 9px; height: 4px; border-radius: 2px;
  background: repeating-linear-gradient(90deg, var(--st-retrying) 0 3px, transparent 3px 7px); opacity: 0.6; }
.gantt-detail { margin: 2px 0 8px; padding: 11px 13px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; }
.gd-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 11px; align-items: center; }
.gd-meta b { color: var(--text-faint); font-weight: 400; margin-right: 4px; }
.gd-err { margin-top: 9px; font-size: 11px; color: var(--st-failed);
  background: color-mix(in oklch, var(--st-failed) 9%, transparent);
  border: 1px solid color-mix(in oklch, var(--st-failed) 22%, transparent); border-radius: 5px;
  padding: 6px 8px; white-space: pre-wrap; word-break: break-word; }
.gd-io { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.gd-iol, .io-l { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint);
  margin-bottom: 5px; }
@media (max-width: 720px) { .gd-io { grid-template-columns: 1fr; } .wfm-fields { grid-template-columns: repeat(2, 1fr); } }

/* ---------- event table ---------- */
.evtable { font-family: var(--mono); font-size: 11.5px; }
.evt-head, .evt-row { display: grid; grid-template-columns: 92px 54px 230px 130px 1fr; gap: 12px; align-items: center; }
.evt-head { color: var(--text-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 6px 8px; border-bottom: 1px solid var(--border); position: sticky; top: calc(-1 * var(--pad));
  background: var(--panel); z-index: 2; }
.evt-row { padding: 6px 8px; border-bottom: 1px solid var(--border-soft); }
.evt-row.clickable { cursor: pointer; }
.evt-row.clickable:hover { background: var(--row-hover); }
.evt-time, .evt-eid { color: var(--text-faint); }
.evt-type { display: inline-flex; align-items: center; gap: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.evt-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.evt-act { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.evt-prev { color: var(--text-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.evt-exp { color: var(--text-faint); margin-left: 7px; }
.evt-payload { padding: 4px 8px 10px 158px; }

/* formatted event detail tokens */
.evd { white-space: nowrap; }
.evd .att { color: var(--text); font-weight: 500; }
.evd .lab { color: var(--text-faint); }
.evd .args { color: var(--text-dim); }
.evd .err { color: var(--st-failed); }
.evd .warn { color: var(--st-retrying); }
.evd .ok { color: var(--st-completed); }
.evd .meta { color: var(--text-faint); }
.evd .sep { color: var(--text-faint); margin: 0 5px; }

/* pagination */
.pager { display: flex; align-items: center; gap: 12px; padding: 8px var(--pad); border-top: 1px solid var(--border);
  background: var(--panel); flex: none; font-family: var(--mono); font-size: 11.5px; }
.pg-info { color: var(--text-faint); }
.pg-ctrls { display: flex; align-items: center; gap: 8px; }
.pg-btn { font-family: var(--mono); font-size: 11.5px; color: var(--text-dim); background: var(--panel-2);
  border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; }
.pg-btn:hover:not(:disabled) { background: var(--panel-3); color: var(--text); }
.pg-btn:disabled { opacity: 0.4; cursor: default; }
.pg-pages { display: flex; gap: 3px; }
.pg-num { min-width: 26px; height: 26px; display: grid; place-items: center; font-family: var(--mono);
  font-size: 11.5px; color: var(--text-dim); background: none; border: 1px solid transparent; border-radius: 6px;
  cursor: pointer; padding: 0 6px; }
.pg-num:hover { background: var(--row-hover); color: var(--text); }
.pg-num.on { background: var(--panel-3); border-color: var(--border); color: var(--text); }
.pg-ell { color: var(--text-faint); padding: 0 2px; align-self: center; }

/* ---------- input/result panel ---------- */
.io-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 720px) { .io-panel { grid-template-columns: 1fr; } }

.flash { animation: flash 1.1s ease; }
@keyframes flash { 0% { background: color-mix(in oklch, var(--accent) 22%, transparent); } 100% { background: transparent; } }

/* ---------- metrics (grafana-style) ---------- */
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; padding: var(--pad) var(--pad) 0; }
.kpi { background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px 8px; }
.kpi-l { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint); }
.kpi-v { font-size: 30px; font-weight: 600; margin: 4px 0 6px; letter-spacing: -0.02em; line-height: 1; }
.kpi-v small { font-size: 11px; color: var(--text-faint); font-weight: 400; letter-spacing: 0; }
.kpi-spark { height: 36px; }

.gpanels { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 12px; padding: 12px var(--pad) var(--pad); }
.gpanel { background: var(--panel-2); border: 1px solid var(--border); border-radius: 9px; padding: 12px 14px 10px; }
.gpanel-h { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.gpanel-t { font-size: 12px; font-weight: 500; color: var(--text); }
.legend { display: flex; gap: 12px; margin-left: auto; }
.lg { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); }
.lg-d { width: 8px; height: 2px; border-radius: 1px; }

.chart { display: grid; grid-template-columns: 36px 1fr; gap: 8px; }
.chart-y { display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end;
  font-size: 9.5px; color: var(--text-faint); padding-bottom: 16px; }
.chart-main { min-width: 0; }
.chart .grid-l { stroke: var(--border-soft); stroke-width: 1; stroke-dasharray: 3 4; }
.chart-x { display: flex; justify-content: space-between; font-size: 9.5px; color: var(--text-faint); margin-top: 4px; }

  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script>
/* temporal-lite — mock engine
 * Faithful to the real backend: there is NO activity table.
 * Activities are RECONSTRUCTED from the wflow.events log (ACTIVITY_* events)
 * plus wflow.schedule (retry wakeups). deriveActivities() does that reconstruction.
 * Everything is exposed on window for the babel component scripts.
 */
(function () {
  // ---- seeded RNG so the initial dataset is stable across reloads ----
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  let rng = mulberry32(20260531);
  const rand = () => rng();
  const pick = (arr) => arr[Math.floor(rand() * arr.length)];
  const ri = (lo, hi) => lo + Math.floor(rand() * (hi - lo + 1));

  // ---- domain catalog ----
  const TASK_QUEUES = ['default', 'payments', 'media', 'reports', 'notify'];

  const TEMPLATES = [
    { type: 'OrderWorkflow', queue: 'payments',
      acts: [
        { name: 'ValidateOrder', ms: [120, 400], fail: 0.04 },
        { name: 'ChargeCard', ms: [600, 2200], fail: 0.22 },
        { name: 'ReserveInventory', ms: [300, 900], fail: 0.08 },
        { name: 'SendConfirmation', ms: [200, 700], fail: 0.05 },
      ],
      input: () => ({ orderId: ri(1000, 9999), amount: +(rand() * 480 + 9).toFixed(2), currency: 'USD' }) },
    { type: 'UserOnboardingWorkflow', queue: 'notify',
      acts: [
        { name: 'ProvisionAccount', ms: [400, 1200], fail: 0.06 },
        { name: 'SendWelcomeEmail', ms: [150, 600], fail: 0.12 },
        { name: 'SyncCRM', ms: [500, 2600], fail: 0.18 },
      ],
      input: () => ({ userId: 'usr_' + ri(10000, 99999), plan: pick(['free', 'pro', 'team']) }) },
    { type: 'PaymentReconciliation', queue: 'payments',
      acts: [
        { name: 'FetchTransactions', ms: [700, 2400], fail: 0.05 },
        { name: 'MatchLedger', ms: [900, 3200], fail: 0.10 },
        { name: 'FlagDiscrepancies', ms: [250, 800], fail: 0.07 },
      ],
      input: () => ({ batchId: 'rec_' + ri(2000, 9000), window: pick(['1h', '24h', '7d']) }) },
    { type: 'DataExportWorkflow', queue: 'reports',
      acts: [
        { name: 'QueryWarehouse', ms: [1200, 4800], fail: 0.09 },
        { name: 'RenderReport', ms: [800, 2600], fail: 0.06 },
        { name: 'UploadToS3', ms: [400, 1500], fail: 0.14 },
        { name: 'NotifyUser', ms: [120, 400], fail: 0.04 },
      ],
      input: () => ({ reportId: 'rpt_' + ri(100, 999), format: pick(['csv', 'parquet', 'xlsx']) }) },
    { type: 'ImageProcessing', queue: 'media',
      acts: [
        { name: 'DownloadAsset', ms: [300, 1400], fail: 0.10 },
        { name: 'ResizeVariants', ms: [600, 2200], fail: 0.05 },
        { name: 'RunOCR', ms: [1500, 5200], fail: 0.16 },
        { name: 'IndexSearch', ms: [200, 700], fail: 0.06 },
      ],
      input: () => ({ assetId: 'img_' + ri(100000, 999999), variants: ri(2, 5) }) },
  ];

  const ERRORS = [
    { msg: 'java.net.SocketTimeoutException: Read timed out', kind: 'timeout' },
    { msg: 'io.grpc.StatusRuntimeException: UNAVAILABLE: connection refused', kind: 'fail' },
    { msg: 'com.stripe.exception.RateLimitException: Too many requests (429)', kind: 'fail' },
    { msg: 'org.postgresql.util.PSQLException: deadlock detected', kind: 'fail' },
    { msg: 'java.lang.IllegalStateException: ledger account not found', kind: 'fail' },
    { msg: 'software.amazon.awssdk.services.s3.S3Exception: SlowDown (503)', kind: 'fail' },
  ];

  // ---- id sequences ----
  let WF_ID = 100;
  let EV_ID = 10000;

  // builds the event stream for one workflow, returns {workflow, events}
  function buildWorkflow(now, ageMs, forceState) {
    const tpl = pick(TEMPLATES);
    const wfId = ++WF_ID;
    const createdAt = now - ageMs;
    const input = tpl.input();
    const events = [];
    let t = createdAt;
    const ev = (eventType, o) => {
      events.push({
        id: ++EV_ID, workflowId: wfId, eventType,
        commandType: o.commandType ?? null, seq: o.seq ?? null,
        activityName: o.activityName ?? null,
        payload: o.payload != null ? JSON.stringify(o.payload) : null,
        createdAt: new Date(t).toISOString(),
      });
    };

    ev('WORKFLOW_CREATED', { payload: input });
    t += ri(20, 120);
    ev('WORKFLOW_TASK_QUEUED', {});
    t += ri(40, 300);
    ev('WORKFLOW_TASK_STARTED', {});

    // decide overall outcome
    const outcome = forceState || pick(['COMPLETED', 'COMPLETED', 'COMPLETED', 'FAILED', 'RUNNING', 'RUNNING']);
    let status = 'RUNNING', result = null, error = null, completedAt = null;
    let seq = 0;
    let died = false;
    // if this workflow is destined to fail, pick the activity that dies
    const failAt = outcome === 'FAILED' ? ri(0, tpl.acts.length - 1) : -1;

    for (let i = 0; i < tpl.acts.length; i++) {
      const act = tpl.acts[i];
      seq++;
      const maxAttempts = 4;
      let attempt = 0;
      let done = false;

      // if RUNNING outcome and we've reached a cutoff, leave this activity in-flight
      const isLastReachable = outcome === 'RUNNING' && i === Math.min(tpl.acts.length - 1, ri(0, tpl.acts.length - 1));

      while (attempt < maxAttempts && !done) {
        attempt++;
        ev('ACTIVITY_STARTED', { commandType: 'ACTIVITY', seq, activityName: act.name,
          payload: { attempt, args: input } });
        const dur = ri(act.ms[0], act.ms[1]);

        if (isLastReachable && attempt === 1) {
          // freeze: this activity is still running "now"
          t = now - ri(200, Math.max(400, Math.floor(dur * 0.6)));
          status = 'RUNNING';
          done = true; died = true; break;
        }

        t += dur;
        const forceFail = i === failAt;
        const willFail = forceFail || rand() < act.fail;
        if (willFail && attempt < maxAttempts) {
          const e = pick(ERRORS);
          const evType = e.kind === 'timeout' ? 'ACTIVITY_TIMEOUT' : 'ACTIVITY_FAILED';
          ev(evType, { commandType: 'ACTIVITY', seq, activityName: act.name,
            payload: { attempt, error: e.msg } });
          const backoff = Math.min(30000, 500 * Math.pow(2, attempt - 1)) + ri(0, 400);
          ev('ACTIVITY_RETRY_SCHEDULED', { commandType: 'ACTIVITY', seq, activityName: act.name,
            payload: { attempt, nextAttempt: attempt + 1, backoffMs: backoff,
              fireAt: new Date(t + backoff).toISOString(), error: e.msg } });
          t += backoff;
        } else if (willFail) {
          // exhausted -> activity dead -> workflow fails
          const e = pick(ERRORS);
          ev('ACTIVITY_FAILED', { commandType: 'ACTIVITY', seq, activityName: act.name,
            payload: { attempt, error: e.msg, terminal: true } });
          error = act.name + ': ' + e.msg;
          status = 'FAILED'; died = true; done = true;
          break;
        } else {
          const out = activityOutput(act.name, input);
          ev('ACTIVITY_COMPLETED', { commandType: 'ACTIVITY', seq, activityName: act.name,
            payload: out });
          done = true;
        }
      }
      if (died) break;
    }

    if (!died && outcome !== 'RUNNING') {
      result = workflowResult(tpl.type, input);
      t += ri(20, 80);
      ev('WORKFLOW_COMPLETED', { payload: result });
      status = 'COMPLETED'; completedAt = new Date(t).toISOString();
    } else if (status === 'FAILED') {
      t += ri(20, 80);
      ev('WORKFLOW_FAILED', { payload: { error } });
      completedAt = new Date(t).toISOString();
    }

    const workflow = {
      id: wfId, workflowType: tpl.type, status,
      input: JSON.stringify(input),
      result: result ? JSON.stringify(result) : null,
      error,
      taskQueue: tpl.queue,
      createdAt: new Date(createdAt).toISOString(),
      updatedAt: new Date(t).toISOString(),
      completedAt,
    };
    return { workflow, events };
  }

  function activityOutput(name, input) {
    switch (name) {
      case 'ChargeCard': return { charged: true, txn: 'ch_' + Math.floor(rand() * 1e9).toString(36) };
      case 'ReserveInventory': return { reserved: true, sku: ri(10, 99) };
      case 'ValidateOrder': return { valid: true };
      case 'SendConfirmation': case 'SendWelcomeEmail': case 'NotifyUser':
        return { delivered: true, messageId: 'msg_' + ri(10000, 99999) };
      case 'ProvisionAccount': return { accountId: 'acc_' + ri(1000, 9999) };
      case 'SyncCRM': return { synced: true, records: ri(1, 12) };
      case 'FetchTransactions': return { count: ri(40, 4000) };
      case 'MatchLedger': return { matched: ri(30, 3900), unmatched: ri(0, 14) };
      case 'FlagDiscrepancies': return { flagged: ri(0, 9) };
      case 'QueryWarehouse': return { rows: ri(1000, 980000) };
      case 'RenderReport': return { pages: ri(2, 80) };
      case 'UploadToS3': return { key: 's3://exports/' + ri(1000, 9999) + '.dat', bytes: ri(2e5, 9e7) };
      case 'DownloadAsset': return { bytes: ri(1e4, 8e6) };
      case 'ResizeVariants': return { variants: input.variants ?? 3 };
      case 'RunOCR': return { chars: ri(0, 18000), lang: 'en' };
      case 'IndexSearch': return { indexed: true };
      default: return { ok: true };
    }
  }
  function workflowResult(type, input) {
    switch (type) {
      case 'OrderWorkflow': return { orderId: input.orderId, charged: true };
      case 'UserOnboardingWorkflow': return { userId: input.userId, ready: true };
      case 'PaymentReconciliation': return { batchId: input.batchId, discrepancies: ri(0, 6) };
      case 'DataExportWorkflow': return { reportId: input.reportId, url: 's3://exports/' + input.reportId + '.' + input.format };
      case 'ImageProcessing': return { assetId: input.assetId, indexed: true };
      default: return { ok: true };
    }
  }

  // ============================================================
  //  ACTIVITY RECONSTRUCTION  — the heart of this UI.
  //  There is no activity table; we fold the event stream.
  // ============================================================
  function deriveActivities(events, workflowsById) {
    const groups = new Map(); // key = wfId:seq
    for (const e of events) {
      if (!e.activityName || e.seq == null) continue;
      if (!e.eventType.startsWith('ACTIVITY_')) continue;
      const key = e.workflowId + ':' + e.seq;
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(e);
    }
    const out = [];
    for (const [key, evs] of groups) {
      evs.sort((a, b) => a.id - b.id);
      const first = evs[0];
      const wf = workflowsById[first.workflowId] || {};
      const starts = evs.filter((e) => e.eventType === 'ACTIVITY_STARTED');
      const last = evs[evs.length - 1];
      const attempt = starts.length;
      const maxAttempts = 4;

      let status, endTime = null, lastError = null, nextRetryAt = null, output = null;
      switch (last.eventType) {
        case 'ACTIVITY_STARTED': status = 'RUNNING'; break;
        case 'ACTIVITY_COMPLETED': status = 'COMPLETED'; endTime = last.createdAt; output = last.payload; break;
        case 'ACTIVITY_RETRY_SCHEDULED': {
          status = 'RETRYING';
          try { const p = JSON.parse(last.payload || '{}'); nextRetryAt = p.fireAt; lastError = p.error; } catch (_) {}
          break;
        }
        case 'ACTIVITY_TIMEOUT': status = 'TIMED_OUT'; endTime = last.createdAt;
          try { lastError = JSON.parse(last.payload || '{}').error; } catch (_) {} break;
        case 'ACTIVITY_FAILED': status = 'FAILED'; endTime = last.createdAt;
          try { lastError = JSON.parse(last.payload || '{}').error; } catch (_) {} break;
        default: status = 'RUNNING';
      }
      // surface latest non-terminal error even while retrying
      for (const e of evs) {
        if (e.eventType === 'ACTIVITY_FAILED' || e.eventType === 'ACTIVITY_TIMEOUT') {
          try { const p = JSON.parse(e.payload || '{}'); if (p.error) lastError = p.error; } catch (_) {}
        }
      }
      let input = null;
      try { input = JSON.parse(first.payload || '{}').args; } catch (_) {}

      const startTime = first.createdAt;
      const startMs = Date.parse(startTime);
      const endMs = endTime ? Date.parse(endTime) : null;

      out.push({
        id: key,
        seq: first.seq,
        name: first.activityName,
        workflowId: first.workflowId,
        workflowType: wf.workflowType || '—',
        taskQueue: wf.taskQueue || 'default',
        status,
        attempt,
        maxAttempts,
        startTime,
        endTime,
        startMs,
        endMs,
        durationMs: endMs ? endMs - startMs : null,
        input,
        output: output,
        lastError,
        nextRetryAt,
        events: evs,
      });
    }
    out.sort((a, b) => b.startMs - a.startMs);
    return out;
  }

  // ---- workers (no endpoint yet — synthetic, flagged in UI) ----
  function buildWorkers(now) {
    const hosts = ['wf-worker-a1', 'wf-worker-a2', 'wf-worker-b1', 'wf-worker-b2', 'wf-worker-c1'];
    return hosts.map((h, i) => ({
      id: h + '-' + Math.floor(rand() * 1e6).toString(36),
      host: h,
      taskQueues: i === 4 ? ['media'] : TASK_QUEUES.slice(0, ri(2, 4)),
      status: i === 3 ? 'DRAINING' : 'ALIVE',
      activeTasks: ri(0, 6),
      capacity: 8,
      pollRate: ri(40, 220),
      lastHeartbeat: new Date(now - ri(200, 4200)).toISOString(),
    }));
  }

  // ---- store assembly ----
  function createStore() {
    rng = mulberry32(20260531);
    WF_ID = 100; EV_ID = 10000;
    const now = Date.now();
    const workflows = [];
    let events = [];
    // history: 22 workflows spread over the last ~40 min
    const N = 22;
    for (let i = 0; i < N; i++) {
      const age = Math.floor((i / N) * 40 * 60000) + ri(2000, 40000);
      // first few RUNNING (live board), a few FAILED for variety, rest mixed
      const force = i < 4 ? 'RUNNING' : (i < 7 ? 'FAILED' : null);
      const { workflow, events: evs } = buildWorkflow(now, age, force);
      workflows.push(workflow);
      events = events.concat(evs);
    }
    events.sort((a, b) => a.id - b.id);
    return { now, workflows, events, workers: buildWorkers(now), nextEv: EV_ID, nextWf: WF_ID };
  }

  // ============================================================
  //  LIVE SIMULATION — mutate store in place to mimic polling.
  //  Advances running activities; fires retries; finishes/creates wfs.
  // ============================================================
  function tickSimulation(store) {
    const now = Date.now();
    store.now = now;
    const byId = {};
    store.workflows.forEach((w) => (byId[w.id] = w));
    const acts = deriveActivities(store.events, byId);
    let changed = false;

    const pushEv = (wfId, eventType, o) => {
      store.events.push({
        id: ++store.nextEv, workflowId: wfId, eventType,
        commandType: o.commandType ?? null, seq: o.seq ?? null,
        activityName: o.activityName ?? null,
        payload: o.payload != null ? JSON.stringify(o.payload) : null,
        createdAt: new Date(now).toISOString(),
      });
      changed = true;
    };

    for (const a of acts) {
      const wf = byId[a.workflowId];
      if (!wf || wf.status !== 'RUNNING') continue;

      if (a.status === 'RUNNING') {
        const elapsed = now - a.startMs;
        // ~ finish after 1.2–4s of real elapsed, weighted by chance
        if (elapsed > 1200 && rand() < 0.5) {
          const fail = rand() < 0.18 && a.attempt < a.maxAttempts;
          const hardFail = rand() < 0.10 && a.attempt >= a.maxAttempts;
          if (fail) {
            const e = ERRORS[Math.floor(rand() * ERRORS.length)];
            const evType = e.kind === 'timeout' ? 'ACTIVITY_TIMEOUT' : 'ACTIVITY_FAILED';
            pushEv(wf.id, evType, { commandType: 'ACTIVITY', seq: a.seq, activityName: a.name,
              payload: { attempt: a.attempt, error: e.msg } });
            const backoff = Math.min(30000, 800 * Math.pow(2, a.attempt - 1));
            pushEv(wf.id, 'ACTIVITY_RETRY_SCHEDULED', { commandType: 'ACTIVITY', seq: a.seq, activityName: a.name,
              payload: { attempt: a.attempt, nextAttempt: a.attempt + 1, backoffMs: backoff,
                fireAt: new Date(now + backoff).toISOString(), error: e.msg } });
          } else if (hardFail) {
            const e = ERRORS[Math.floor(rand() * ERRORS.length)];
            pushEv(wf.id, 'ACTIVITY_FAILED', { commandType: 'ACTIVITY', seq: a.seq, activityName: a.name,
              payload: { attempt: a.attempt, error: e.msg, terminal: true } });
            wf.status = 'FAILED'; wf.error = a.name + ': ' + e.msg;
            wf.completedAt = new Date(now).toISOString(); wf.updatedAt = wf.completedAt;
            pushEv(wf.id, 'WORKFLOW_FAILED', { payload: { error: wf.error } });
          } else {
            let input = a.input || {};
            pushEv(wf.id, 'ACTIVITY_COMPLETED', { commandType: 'ACTIVITY', seq: a.seq, activityName: a.name,
              payload: activityOutput(a.name, input) });
            // maybe start next activity in the workflow, or complete the wf
            maybeAdvanceWorkflow(store, wf, a, pushEv, byId);
          }
        }
      } else if (a.status === 'RETRYING') {
        if (a.nextRetryAt && Date.parse(a.nextRetryAt) <= now) {
          pushEv(wf.id, 'ACTIVITY_STARTED', { commandType: 'ACTIVITY', seq: a.seq, activityName: a.name,
            payload: { attempt: a.attempt + 1, args: a.input } });
        }
      }
    }

    // occasionally spawn a brand-new workflow
    if (rand() < 0.18) {
      const { workflow, events: evs } = buildWorkflow(now, ri(200, 1500), 'RUNNING');
      byId[workflow.id] = workflow;
      store.workflows.unshift(workflow);
      store.nextWf = Math.max(store.nextWf, workflow.id);
      evs.forEach((e) => { e.id = ++store.nextEv; });
      store.events = store.events.concat(evs);
      changed = true;
    }

    // jitter workers
    for (const w of store.workers) {
      if (rand() < 0.5) { w.activeTasks = Math.max(0, Math.min(w.capacity, w.activeTasks + (rand() < 0.5 ? -1 : 1))); }
      if (rand() < 0.6) { w.lastHeartbeat = new Date(now - ri(150, 2500)).toISOString(); changed = true; }
    }
    store.events.sort((a, b) => a.id - b.id);
    return changed;
  }

  function maybeAdvanceWorkflow(store, wf, finishedAct, pushEv, byId) {
    const now = store.now;
    // figure out how many activities this template expects
    const tpl = TEMPLATES.find((t) => t.type === wf.workflowType);
    const total = tpl ? tpl.acts.length : finishedAct.seq;
    if (finishedAct.seq >= total) {
      const result = workflowResult(wf.workflowType, safeParse(wf.input));
      wf.status = 'COMPLETED'; wf.result = JSON.stringify(result);
      wf.completedAt = new Date(now).toISOString(); wf.updatedAt = wf.completedAt;
      pushEv(wf.id, 'WORKFLOW_COMPLETED', { payload: result });
    } else {
      const next = tpl.acts[finishedAct.seq]; // seq is 1-based, acts 0-based -> next index = seq
      pushEv(wf.id, 'ACTIVITY_STARTED', { commandType: 'ACTIVITY', seq: finishedAct.seq + 1,
        activityName: next.name, payload: { attempt: 1, args: safeParse(wf.input) } });
    }
  }
  function safeParse(s) { try { return JSON.parse(s); } catch (_) { return {}; } }

  // ---- formatters ----
  function fmtDuration(ms) {
    if (ms == null) return '—';
    if (ms < 0) ms = 0;
    if (ms < 1000) return Math.round(ms) + 'ms';
    if (ms < 60000) return (ms / 1000).toFixed(ms < 10000 ? 2 : 1) + 's';
    const totalS = Math.round(ms / 1000);
    const m = Math.floor(totalS / 60), s = totalS % 60;
    return m + 'm ' + s + 's';
  }
  function timeAgo(iso, now) {
    const d = (now ?? Date.now()) - Date.parse(iso);
    if (d < 1000) return 'just now';
    if (d < 60000) return Math.floor(d / 1000) + 's ago';
    if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
    if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
    return Math.floor(d / 86400000) + 'd ago';
  }
  function fmtClock(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-GB', { hour12: false }) + '.' +
      String(d.getMilliseconds()).padStart(3, '0');
  }
  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false })
      .replace(',', '');
  }

  // simulates a "facets" endpoint: distinct types & statuses actually present in the store
  const STATUS_ORDER = { RUNNING: 0, PENDING: 1, COMPLETED: 2, FAILED: 3, CANCELLED: 4 };
  function facets(store) {
    const types = new Set(), statuses = new Set();
    for (const w of store.workflows) { types.add(w.workflowType); statuses.add(w.status); }
    return {
      types: [...types].sort(),
      statuses: [...statuses].sort((a, b) => (STATUS_ORDER[a] ?? 9) - (STATUS_ORDER[b] ?? 9)),
    };
  }

  // ============================================================
  //  METRICS — fold events into time-series over a window.
  //  (No metrics endpoint exists; computed client-side, Grafana-style.)
  // ============================================================
  function buildMetrics(store, from, to, wfTypes, nBuckets) {
    nBuckets = nBuckets || 48;
    const now = store.now || Date.now();
    // optional filter to one or more workflow types
    let wfs = store.workflows, evs = store.events;
    if (wfTypes && wfTypes.length) {
      const set = new Set(wfTypes);
      const ids = new Set(wfs.filter((w) => set.has(w.workflowType)).map((w) => w.id));
      wfs = wfs.filter((w) => ids.has(w.id));
      evs = evs.filter((e) => ids.has(e.workflowId));
    }
    let lo = from, hi = to;
    if (!isFinite(lo)) {
      lo = now;
      for (const w of wfs) { const ts = Date.parse(w.createdAt); if (ts < lo) lo = ts; }
    }
    if (!isFinite(hi)) hi = now;
    if (hi <= lo) hi = lo + 1;
    const span = hi - lo, bw = span / nBuckets;
    const bIndex = (ts) => { const i = Math.floor((ts - lo) / bw); return i < 0 || i >= nBuckets ? -1 : i; };
    const z = () => new Array(nBuckets).fill(0);

    const created = z(), started = z(), completed = z(), failed = z(), durSumB = z(), durNB = z();
    for (const e of evs) {
      const i = bIndex(Date.parse(e.createdAt)); if (i < 0) continue;
      if (e.eventType === 'WORKFLOW_CREATED') created[i]++;
      else if (e.eventType === 'ACTIVITY_STARTED') started[i]++;
      else if (e.eventType === 'ACTIVITY_COMPLETED') completed[i]++;
      else if (e.eventType === 'ACTIVITY_FAILED' || e.eventType === 'ACTIVITY_TIMEOUT') failed[i]++;
    }

    // gauges: build coverage intervals from activities
    const byId = {}; wfs.forEach((w) => (byId[w.id] = w));
    const acts = deriveActivities(evs, byId);
    const execIv = [], schedIv = [];
    for (const a of acts) {
      let st = null;
      for (const e of a.events) {
        const ts = Date.parse(e.createdAt);
        if (e.eventType === 'ACTIVITY_STARTED') st = ts;
        else if (st != null && (e.eventType === 'ACTIVITY_COMPLETED' || e.eventType === 'ACTIVITY_FAILED' || e.eventType === 'ACTIVITY_TIMEOUT')) { execIv.push([st, ts]); st = null; }
        if (e.eventType === 'ACTIVITY_RETRY_SCHEDULED') {
          let fire = ts; try { const p = JSON.parse(e.payload || '{}'); if (p.fireAt) fire = Date.parse(p.fireAt); } catch (_) {}
          schedIv.push([ts, fire]);
        }
      }
      if (st != null) execIv.push([st, now]);
      if (a.durationMs != null) { const i = bIndex(a.startMs); if (i >= 0) { durSumB[i] += a.durationMs; durNB[i]++; } }
    }
    const wfIv = wfs.map((w) => [Date.parse(w.createdAt), w.completedAt ? Date.parse(w.completedAt) : now]);
    const countAt = (iv, T) => { let c = 0; for (let k = 0; k < iv.length; k++) if (iv[k][0] <= T && iv[k][1] > T) c++; return c; };

    const executing = z(), schedule = z(), active = z(), avgDur = z(), successRate = new Array(nBuckets).fill(null);
    for (let i = 0; i < nBuckets; i++) {
      const T = lo + (i + 1) * bw;
      executing[i] = countAt(execIv, T);
      schedule[i] = countAt(schedIv, T);
      active[i] = countAt(wfIv, T);
      avgDur[i] = durNB[i] ? durSumB[i] / durNB[i] : 0;
      const tot = completed[i] + failed[i];
      successRate[i] = tot ? Math.round((completed[i] / tot) * 100) : null;
    }
    const queue = executing.map((ex, i) => Math.max(0, active[i] - ex));

    // current snapshot at "now"
    let durSum = 0, durN = 0, compTot = 0, failTot = 0, createdSum = 0;
    for (let i = 0; i < nBuckets; i++) { createdSum += created[i]; }
    for (const a of acts) {
      if (a.startMs >= lo && a.startMs <= hi) {
        if (a.durationMs != null) { durSum += a.durationMs; durN++; }
        if (a.status === 'COMPLETED') compTot++;
        else if (a.status === 'FAILED' || a.status === 'TIMED_OUT') failTot++;
      }
    }
    const cur = {
      created: createdSum,
      executing: countAt(execIv, now),
      schedule: countAt(schedIv, now),
      queue: Math.max(0, countAt(wfIv, now) - countAt(execIv, now)),
      avgDurationMs: durN ? durSum / durN : 0,
      successPct: (compTot + failTot) ? Math.round((compTot / (compTot + failTot)) * 100) : 100,
      started: started.reduce((s, v) => s + v, 0),
      completed: compTot, failed: failTot,
    };
    return { lo, hi, bw, nBuckets, created, started, completed, failed, executing, queue, schedule, successRate, avgDur, cur };
  }

  window.TLData = {
    createStore, tickSimulation, deriveActivities, buildMetrics,
    fmtDuration, timeAgo, fmtClock, fmtDate, facets, TASK_QUEUES,
    ACTIVITY_STATUSES: ['RUNNING', 'RETRYING', 'COMPLETED', 'FAILED', 'TIMED_OUT'],
    WF_STATUSES: ['PENDING', 'RUNNING', 'COMPLETED', 'FAILED', 'CANCELLED'],
  };
})();

  </script>
  <script>
/* temporal-lite — real backend adapter.
 * Overrides the mock data source with live REST calls to the workflow engine. The pure helpers
 * defined above (formatters, deriveActivities, facets, *_STATUSES) are kept as-is; only the data
 * SOURCE is swapped. Endpoints: GET /workflow/api/workflows, /workers, /metrics, /workflows/:id/events.
 */
(function () {
  const TL = window.TLData;
  const API = '/workflow/api';

  function emptyMetrics() {
    const n = 48, z = () => new Array(n).fill(0), now = Date.now();
    return { lo: now - 86400e3, hi: now, bw: 86400e3 / n, nBuckets: n,
      created: z(), started: z(), completed: z(), failed: z(),
      running: z(), executing: z(), queue: z(), schedule: z(),
      successRate: new Array(n).fill(null), avgDur: z(),
      cur: { created: 0, executing: 0, schedule: 0, queue: 0, running: 0,
             avgDurationMs: 0, successPct: 100, started: 0, completed: 0, failed: 0 } };
  }

  async function getJSON(path) {
    const res = await fetch(API + path, { headers: { Accept: 'application/json' } });
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
    return res.json();
  }

  // Refresh workflows + workers + metrics into the (stable) store object held by <App/>.
  // Arrays are REPLACED (new references) so React useMemo deps actually change.
  async function refresh(store) {
    try {
      const [wfs, workers, metrics] = await Promise.all([
        getJSON('/workflows?limit=500'),
        getJSON('/workers').catch(() => store.workers),
        getJSON('/metrics?buckets=48').catch(() => store.__metrics),
      ]);
      store.workflows = Array.isArray(wfs) ? wfs : [];
      store.workers = Array.isArray(workers) ? workers : (store.workers || []);
      store.__metrics = metrics || store.__metrics;
      store.now = Date.now();
      store.__changed = true;
    } catch (e) {
      console.error('workflow-ui: refresh failed', e);
    }
  }

  TL.createStore = function () {
    const store = { now: Date.now(), workflows: [], events: [], workers: [],
                    __metrics: emptyMetrics(), __changed: false };
    refresh(store);
    return store;
  };

  // Called each poll: kick a background refresh, report whether the PREVIOUS one landed new data.
  TL.tickSimulation = function (store) {
    refresh(store);
    const changed = store.__changed;
    store.__changed = false;
    return changed;
  };

  // Metrics are computed server-side and persisted to wflow.metrics_snapshot; return the cache.
  TL.buildMetrics = function (store) {
    return store.__metrics || emptyMetrics();
  };

  // Per-workflow event history, fetched on demand when a workflow modal opens.
  TL.fetchEvents = function (wfId) {
    return getJSON('/workflows/' + wfId + '/events')
      .then((evs) => Array.isArray(evs) ? evs.slice().sort((a, b) => a.id - b.id) : [])
      .catch(() => []);
  };
})();
  </script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

function TweakRow({ label, value, children, inline = false }) {

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />

  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

<script type="text/babel" data-src="components.jsx">
/* temporal-lite — shared primitives */
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ---- inline icons (stroke, 24 viewBox) ----
const Icon = ({ d, fill, size, style }) => (
  <svg className="ic" viewBox="0 0 24 24" width={size} height={size} fill={fill ? 'currentColor' : 'none'}
    stroke={fill ? 'none' : 'currentColor'} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"
    style={style}>
    {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}
  </svg>
);
const ICONS = {
  activity: 'M22 12h-4l-3 9L9 3l-3 9H2',
  workflow: ['M5 3a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h3a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z', 'M14 7h6', 'M14 12h6', 'M5 14a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h3a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2z', 'M14 16h6', 'M14 21h6'],
  worker: ['M2 14h20', 'M4 6h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z', 'M7 18v2', 'M17 18v2'],
  chart: ['M3 3v18h18', 'M7 14l3-4 3 3 4-6'],
  search: ['M11 11m-7 0a7 7 0 1 0 14 0a7 7 0 1 0-14 0', 'M21 21l-4.3-4.3'],
  x: 'M18 6 6 18M6 6l12 12',
  filter: 'M22 3H2l8 9.46V19l4 2v-8.54z',
  refresh: ['M21 12a9 9 0 1 1-3-6.7L21 8', 'M21 3v5h-5'],
  retry: ['M3 12a9 9 0 1 0 3-6.7L3 8', 'M3 3v5h5'],
  alert: ['M12 9v4', 'M12 17h.01', 'M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z'],
  clock: ['M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0-18 0', 'M12 7v5l3 2'],
  zap: 'M13 2 3 14h7l-1 8 10-12h-7z',
  copy: ['M9 9h11a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-9a2 2 0 0 1 2-2z', 'M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1'],
  chevron: 'M9 18l6-6-6-6',
  check: 'M20 6 9 17l-5-5',
  dot: 'M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0-6 0',
};
const Ic = ({ name, size, fill, style }) => <Icon d={ICONS[name]} fill={fill} size={size} style={style} />;

// ---- status color map ----
const STATUS_COLOR = {
  RUNNING: 'var(--st-running)', RETRYING: 'var(--st-retrying)', COMPLETED: 'var(--st-completed)',
  FAILED: 'var(--st-failed)', TIMED_OUT: 'var(--st-timeout)', PENDING: 'var(--st-pending)',
  CANCELLED: 'var(--st-cancelled)',
  // workflow + event aliases
  WORKFLOW_CREATED: 'var(--st-pending)', WORKFLOW_TASK_QUEUED: 'var(--st-pending)',
  WORKFLOW_TASK_STARTED: 'var(--st-running)', WORKFLOW_TASK_COMPLETED: 'var(--st-running)',
  WORKFLOW_TASK_FAILED: 'var(--st-failed)', WORKFLOW_COMPLETED: 'var(--st-completed)',
  WORKFLOW_FAILED: 'var(--st-failed)',
  ACTIVITY_STARTED: 'var(--st-running)', ACTIVITY_COMPLETED: 'var(--st-completed)',
  ACTIVITY_FAILED: 'var(--st-failed)', ACTIVITY_TIMEOUT: 'var(--st-timeout)',
  ACTIVITY_RETRY_SCHEDULED: 'var(--st-retrying)', SIDE_EFFECT_RECORDED: 'var(--st-cancelled)',
  VERSION_MARKER: 'var(--st-cancelled)',
};
const statusLabel = (s) => ({ TIMED_OUT: 'TIMEOUT' }[s] || s);
const isLive = (s) => s === 'RUNNING' || s === 'RETRYING';

function StatusBadge({ status }) {
  const c = STATUS_COLOR[status] || 'var(--st-pending)';
  return (
    <span className={'sb' + (isLive(status) ? ' spin' : '')} style={{ '--c': c }}>
      <span className="d"></span>{statusLabel(status)}
    </span>
  );
}

// ---- JSON syntax highlighter (string -> colored HTML) ----
function highlightJson(value) {
  let obj = value;
  if (typeof value === 'string') { try { obj = JSON.parse(value); } catch (_) { return esc(value); } }
  const json = JSON.stringify(obj, null, 2);
  return json.replace(/("(\\.|[^"\\])*"(\s*:)?|\b(true|false)\b|\bnull\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, (m) => {
    let cls = 'n';
    if (/^"/.test(m)) cls = /:$/.test(m) ? 'k' : 's';
    else if (/true|false/.test(m)) cls = 'b';
    else if (/null/.test(m)) cls = 'null';
    return '<span class="' + cls + '">' + esc(m) + '</span>';
  });
}
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function JsonView({ data }) {
  if (data == null || data === 'null') return <div className="json null">null</div>;
  return <pre className="json" dangerouslySetInnerHTML={{ __html: highlightJson(data) }} />;
}

// ---- duration bar (relative to a scale) ----
function DurationBar({ ms, scale, color }) {
  if (ms == null) return <span className="dim mono">running…</span>;
  const pct = Math.max(4, Math.min(100, (ms / scale) * 100));
  return (
    <span className="dur-bar">
      <span style={{ color: 'var(--text)' }}>{window.TLData.fmtDuration(ms)}</span>
      <span className="track"><span className="fill" style={{ width: pct + '%', background: color }} /></span>
    </span>
  );
}

// ---- live duration that ticks while running ----
function LiveDuration({ startMs, now }) {
  const ms = Math.max(0, now - startMs);
  return <span className="mono" style={{ color: 'var(--st-running)' }}>{window.TLData.fmtDuration(ms)}</span>;
}

Object.assign(window, {
  Icon, Ic, ICONS, StatusBadge, JsonView, DurationBar, LiveDuration,
  STATUS_COLOR, statusLabel, isLive, highlightJson,
});

</script>
<script type="text/babel" data-src="filters.jsx">
/* temporal-lite — filter controls: dropdown shell, multi-select, date range */
const { useState: useStateF, useEffect: useEffectF, useRef: useRefF } = React;

function FilterDropdown({ label, summary, active, width, align, children }) {
  const [open, setOpen] = useStateF(false);
  const ref = useRefF(null);
  useEffectF(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('mousedown', onDoc); document.removeEventListener('keydown', onKey); };
  }, [open]);
  return (
    <div className="dd" ref={ref}>
      <button className={'dd-trigger' + (active ? ' active' : '') + (open ? ' open' : '')} onClick={() => setOpen((o) => !o)}>
        <span className="dd-label">{label}</span>
        <span className="dd-summary">{summary}</span>
        <span className="dd-caret">▾</span>
      </button>
      {open && <div className={'dd-panel' + (align === 'right' ? ' right' : '')} style={{ width }}>{children}</div>}
    </div>
  );
}

function MultiSelect({ label, options, selected, onChange, dotColors }) {
  const summary = selected.length === 0 ? 'All'
    : selected.length === 1 ? selected[0]
    : selected.length + ' selected';
  const toggle = (o) => onChange(selected.includes(o) ? selected.filter((x) => x !== o) : [...selected, o]);
  return (
    <FilterDropdown label={label} summary={summary} active={selected.length > 0} width={248}>
      <div className="dd-head">
        <span>{label}</span>
        {selected.length > 0 && <button className="dd-clear" onClick={() => onChange([])}>clear</button>}
      </div>
      <div className="dd-opts">
        {options.length === 0 && <div className="dd-empty">no values</div>}
        {options.map((o) => {
          const on = selected.includes(o);
          return (
            <button key={o} className={'dd-opt' + (on ? ' on' : '')} onClick={() => toggle(o)}>
              <span className={'dd-check' + (on ? ' on' : '')}>{on && <Ic name="check" size={11} />}</span>
              {dotColors && <span className="dd-dot" style={{ background: dotColors(o) }} />}
              <span className="dd-optl">{o}</span>
            </button>
          );
        })}
      </div>
    </FilterDropdown>
  );
}

const DR_PRESETS = [['1h', 'Last hour'], ['24h', 'Last 24 hours'], ['7d', 'Last 7 days'], ['all', 'All time'], ['custom', 'Custom range']];
function toLocalInputF(ms) {
  const d = new Date(ms), p = (n) => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + 'T' + p(d.getHours()) + ':' + p(d.getMinutes());
}
function drShort(s) {
  if (!s) return '…';
  const d = new Date(s); const p = (n) => String(n).padStart(2, '0');
  return p(d.getDate()) + ' ' + d.toLocaleString('en-GB', { month: 'short' }) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}
function DateRangePicker({ preset, from, to, onPreset, setFrom, setTo, now }) {
  const labelFor = { '1h': 'Last hour', '24h': 'Last 24 hours', '7d': 'Last 7 days', 'all': 'All time', 'custom': 'Custom' };
  const summary = preset === 'custom' ? drShort(from) + ' → ' + drShort(to) : labelFor[preset];
  const pick = (k) => {
    if (k === 'custom') {
      if (!from) setFrom(toLocalInputF(now - 86400e3));
      if (!to) setTo(toLocalInputF(now));
    }
    onPreset(k);
  };
  return (
    <FilterDropdown label="time" summary={summary} active={preset !== 'all'} width={preset === 'custom' ? 280 : 200} align="right">
      <div className="dd-opts">
        {DR_PRESETS.map(([k, l]) => (
          <button key={k} className={'dd-opt' + (preset === k ? ' on' : '')} onClick={() => pick(k)}>
            <span className={'dd-check' + (preset === k ? ' on' : '')}>{preset === k && <Ic name="check" size={11} />}</span>
            <span className="dd-optl">{l}</span>
          </button>
        ))}
      </div>
      {preset === 'custom' && (
        <div className="dd-custom">
          <label className="dr-field"><span>From</span>
            <input type="datetime-local" value={from} onChange={(e) => setFrom(e.target.value)} /></label>
          <label className="dr-field"><span>To</span>
            <input type="datetime-local" value={to} onChange={(e) => setTo(e.target.value)} /></label>
        </div>
      )}
    </FilterDropdown>
  );
}

Object.assign(window, { FilterDropdown, MultiSelect, DateRangePicker });

</script>
<script type="text/babel" data-src="workflow-modal.jsx">
/* temporal-lite — Workflow detail modal (fields + Timeline / Events tabs) */
const { useState: useStateM, useMemo: useMemoM } = React;

function WorkflowModal({ workflow, events, now, onClose }) {
  const [tab, setTab] = useStateM('timeline');
  const w = workflow;
  const TL = window.TLData;
  const fmtDur = TL.fmtDuration, fmtClock = TL.fmtClock, timeAgo = TL.timeAgo;

  const activities = useMemoM(
    () => TL.deriveActivities(events, { [w.id]: w }).sort((a, b) => a.seq - b.seq),
    [events, w]
  );

  const wfStatus = mapWfStatus(w.status);
  const t0 = Date.parse(w.createdAt);
  const t1 = w.completedAt ? Date.parse(w.completedAt) : now;
  const dur = t1 - t0;

  // keyboard close
  React.useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  return (
    <div className="wfm-overlay" onClick={onClose}>
      <div className="wfm" onClick={(e) => e.stopPropagation()}>
        {/* header */}
        <div className="wfm-head">
          <div className="wfm-titlerow">
            <StatusBadge status={wfStatus} />
            <h2 className="mono">{w.workflowType}</h2>
            <span className="wfm-id">#{w.id}</span>
            <div className="x" onClick={onClose}><Ic name="x" size={17} /></div>
          </div>
          <div className="wfm-sub mono">
            <span><Ic name="workflow" size={12} /> run {runId(w.id)}</span>
            <span><Ic name="worker" size={12} /> {w.taskQueue}</span>
            <span><Ic name="clock" size={12} /> started {timeAgo(w.createdAt, now)}</span>
          </div>
        </div>

        {/* fields */}
        <div className="wfm-fields">
          <Field label="Status"><StatusBadge status={wfStatus} /></Field>
          <Field label="Type" mono>{w.workflowType}</Field>
          <Field label="Task Queue"><span className="qtag">{w.taskQueue}</span></Field>
          <Field label="Activities" mono>{activities.length}</Field>
          <Field label="Start" mono>{fmtClock(w.createdAt)}</Field>
          <Field label={w.completedAt ? 'End' : 'Elapsed'} mono>
            {w.completedAt
              ? fmtClock(w.completedAt)
              : <span style={{ color: 'var(--st-running)' }}>{fmtDur(Math.max(0, now - t0))}</span>}
          </Field>
          <Field label="Duration" mono>{w.completedAt
            ? fmtDur(dur)
            : <span style={{ color: 'var(--st-running)' }}>{fmtDur(Math.max(0, dur))} (running)</span>}</Field>
          <Field label="Workflow Id" mono>{runId(w.id)}</Field>
        </div>
        {w.error && (
          <div className="wfm-err mono"><Ic name="alert" size={14} /> {w.error}</div>
        )}

        {/* tabs */}
        <div className="wfm-tabs">
          <button className={'wfm-tab' + (tab === 'timeline' ? ' on' : '')} onClick={() => setTab('timeline')}>
            <Ic name="activity" size={14} /> Timeline <span className="n">{activities.length}</span>
          </button>
          <button className={'wfm-tab' + (tab === 'events' ? ' on' : '')} onClick={() => setTab('events')}>
            <Ic name="dot" size={14} fill /> Events <span className="n">{events.length}</span>
          </button>
          {(w.input || w.result) && (
            <button className={'wfm-tab' + (tab === 'io' ? ' on' : '')} onClick={() => setTab('io')}>
              <Ic name="copy" size={13} /> Input &amp; Result
            </button>
          )}
        </div>

        {/* body */}
        <div className="wfm-body">
          {tab === 'timeline' && <Timeline activities={activities} t0={t0} t1={t1} now={now} running={!w.completedAt} />}
          {tab === 'events' && <EventTable events={events} now={now} />}
          {tab === 'io' && <IoPanel input={w.input} result={w.result} error={w.error} />}
        </div>
      </div>
    </div>
  );
}

function Field({ label, children, mono }) {
  return (
    <div className="wfm-field">
      <div className="wfm-fl">{label}</div>
      <div className={'wfm-fv' + (mono ? ' mono' : '')}>{children}</div>
    </div>
  );
}

/* ---------------- Timeline (Gantt of activities) ---------------- */
function Timeline({ activities, t0, t1, now, running }) {
  const TL = window.TLData;
  const span = Math.max(1, t1 - t0);
  const ticks = useMemoM(() => {
    const n = 6, out = [];
    for (let i = 0; i <= n; i++) out.push({ pct: (i / n) * 100, label: '+' + TL.fmtDuration(Math.round((span * i) / n)) });
    return out;
  }, [span]);
  const [open, setOpen] = useStateM(null);

  if (activities.length === 0) {
    return <div className="empty" style={{ height: 160 }}><Ic name="activity" size={26} />
      <div>No activities scheduled yet for this workflow.</div></div>;
  }

  return (
    <div className="gantt">
      <div className="gantt-axis">
        <div className="gantt-axhead">activity</div>
        <div className="gantt-axtrack">
          {ticks.map((tk, i) => (
            <div className="gantt-tick" key={i} style={{ left: tk.pct + '%' }}>
              <span className="gantt-ticklbl">{i === 0 ? '0s' : tk.label}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="gantt-rows">
        {activities.map((a) => {
          const segs = attemptSegments(a, now);
          const c = window.STATUS_COLOR[a.status];
          const isOpen = open === a.id;
          return (
            <React.Fragment key={a.id}>
              <div className={'gantt-row' + (isOpen ? ' open' : '')} onClick={() => setOpen(isOpen ? null : a.id)}>
                <div className="gantt-label">
                  <span className="gl-seq mono">{a.seq}</span>
                  <span className="gl-name">{a.name}</span>
                  {a.attempt > 1 && <span className="gl-att mono">↻{a.attempt}</span>}
                </div>
                <div className="gantt-track">
                  {ticks.map((tk, i) => <span className="gantt-grid" key={i} style={{ left: tk.pct + '%' }} />)}
                  {segs.map((s, i) => {
                    const left = ((s.start - t0) / span) * 100;
                    const width = Math.max(0.6, ((s.end - s.start) / span) * 100);
                    return (
                      <React.Fragment key={i}>
                        {s.gap && (
                          <span className="gantt-gap" style={{
                            left: ((s.gapStart - t0) / span) * 100 + '%',
                            width: Math.max(0.4, ((s.start - s.gapStart) / span) * 100) + '%' }} />
                        )}
                        <span className={'gantt-seg' + (s.live ? ' live' : '')}
                          style={{ left: left + '%', width: width + '%', '--c': window.STATUS_COLOR[s.kind] }}
                          title={'attempt ' + s.n + ' · ' + window.statusLabel(s.kind)} />
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>
              {isOpen && (
                <div className="gantt-detail">
                  <div className="gd-meta mono">
                    <span><b>status</b> <StatusBadge status={a.status} /></span>
                    <span><b>started</b> {TL.fmtClock(a.startTime)}</span>
                    <span><b>duration</b> {a.durationMs != null ? TL.fmtDuration(a.durationMs) : '—'}</span>
                    <span><b>attempts</b> {a.attempt}/{a.maxAttempts}</span>
                    {a.nextRetryAt && <span style={{ color: 'var(--st-retrying)' }}><b>next retry</b> {TL.fmtClock(a.nextRetryAt)}</span>}
                  </div>
                  {a.lastError && <div className="gd-err mono">{a.lastError}</div>}
                  <div className="gd-io">
                    {a.input != null && <div className="gd-iocol"><div className="gd-iol">input</div><JsonView data={a.input} /></div>}
                    {a.output != null && <div className="gd-iocol"><div className="gd-iol">output</div><JsonView data={a.output} /></div>}
                  </div>
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

// split an activity's event stream into positioned attempt segments + retry gaps
function attemptSegments(a, now) {
  const segs = [];
  let cur = null, prevEnd = null;
  for (const e of a.events) {
    const ts = Date.parse(e.createdAt);
    if (e.eventType === 'ACTIVITY_STARTED') {
      let n = segs.length + 1;
      try { n = JSON.parse(e.payload || '{}').attempt || n; } catch (_) {}
      cur = { n, start: ts, end: now, kind: 'RUNNING', live: true,
        gap: prevEnd != null, gapStart: prevEnd };
      segs.push(cur);
    } else if (cur) {
      if (e.eventType === 'ACTIVITY_COMPLETED') { cur.end = ts; cur.kind = 'COMPLETED'; cur.live = false; prevEnd = ts; }
      else if (e.eventType === 'ACTIVITY_FAILED') { cur.end = ts; cur.kind = 'FAILED'; cur.live = false; prevEnd = ts; }
      else if (e.eventType === 'ACTIVITY_TIMEOUT') { cur.end = ts; cur.kind = 'TIMED_OUT'; cur.live = false; prevEnd = ts; }
      else if (e.eventType === 'ACTIVITY_RETRY_SCHEDULED') { /* keep prevEnd for gap */ }
    }
  }
  return segs;
}

/* ---------------- Events tab ---------------- */
function compact(v, maxKeys) {
  maxKeys = maxKeys || 4;
  if (v == null) return '∅';
  if (typeof v !== 'object') return String(v);
  if (Array.isArray(v)) return '[' + v.length + ']';
  const ks = Object.keys(v);
  const parts = ks.slice(0, maxKeys).map((k) => {
    let val = v[k];
    if (val && typeof val === 'object') val = Array.isArray(val) ? '[' + val.length + ']' : '{…}';
    else if (typeof val === 'string' && val.length > 24) val = val.slice(0, 24) + '…';
    return k + ': ' + val;
  });
  if (ks.length > maxKeys) parts.push('+' + (ks.length - maxKeys));
  return '{ ' + parts.join(', ') + ' }';
}

function EventDetail({ e }) {
  let p = null; try { p = e.payload ? JSON.parse(e.payload) : null; } catch (_) {}
  const TL = window.TLData;
  const clk = (iso) => TL.fmtClock(iso).slice(0, 12);
  switch (e.eventType) {
    case 'ACTIVITY_STARTED':
      return <span className="evd"><span className="att">attempt {p?.attempt ?? '?'}</span>
        {p?.args != null && <><span className="sep">·</span><span className="lab">args </span><span className="args">{compact(p.args)}</span></>}</span>;
    case 'ACTIVITY_COMPLETED':
      return <span className="evd"><span className="ok">✓ result </span><span className="args">{compact(p)}</span></span>;
    case 'ACTIVITY_FAILED':
      return <span className="evd"><span className="err">✕ attempt {p?.attempt ?? '?'}{p?.terminal ? ' · terminal' : ''} </span><span className="err">{p?.error || ''}</span></span>;
    case 'ACTIVITY_TIMEOUT':
      return <span className="evd"><span className="warn">⏱ attempt {p?.attempt ?? '?'} timed out </span><span className="err">{p?.error || ''}</span></span>;
    case 'ACTIVITY_RETRY_SCHEDULED':
      return <span className="evd"><span className="warn">↻ retry {p?.attempt}→{p?.nextAttempt}</span>
        <span className="sep">·</span><span className="meta">backoff {TL.fmtDuration(p?.backoffMs || 0)}</span>
        {p?.fireAt && <><span className="sep">·</span><span className="meta">fires {clk(p.fireAt)}</span></>}</span>;
    case 'WORKFLOW_CREATED':
      return <span className="evd"><span className="lab">input </span><span className="args">{compact(p)}</span></span>;
    case 'WORKFLOW_COMPLETED':
      return <span className="evd"><span className="ok">✓ result </span><span className="args">{compact(p)}</span></span>;
    case 'WORKFLOW_FAILED':
      return <span className="evd"><span className="err">✕ {p?.error || compact(p)}</span></span>;
    case 'WORKFLOW_TASK_QUEUED': return <span className="evd"><span className="meta">task enqueued · waiting for worker</span></span>;
    case 'WORKFLOW_TASK_STARTED': return <span className="evd"><span className="meta">worker leased task</span></span>;
    case 'WORKFLOW_TASK_COMPLETED': return <span className="evd"><span className="meta">workflow task replayed</span></span>;

<script type="text/babel" data-src="views.jsx">
/* temporal-lite — main views */
const { useState: useStateV, useMemo: useMemoV } = React;

const COLS = [

// ------- Activities stat header -------
function ActivityStats({ activities, now }) {
  const s = useMemoV(() => {
    const by = { RUNNING: 0, RETRYING: 0, COMPLETED: 0, FAILED: 0, TIMED_OUT: 0 };
    let durSum = 0, durN = 0;
    for (const a of activities) {
      by[a.status] = (by[a.status] || 0) + 1;
      if (a.durationMs != null) { durSum += a.durationMs; durN++; }
    }
    const failed = by.FAILED + by.TIMED_OUT;
    const total = activities.length || 1;
    return { by, avg: durN ? durSum / durN : 0, successRate: Math.round((by.COMPLETED / total) * 100), failed };
  }, [activities]);
  const spark = useMemoV(() => Array.from({ length: 16 }, () => 20 + Math.random() * 80), [Math.floor(now / 4000)]);
  return (
    <div className="stats">
      <div className="stat">
        <div className="label">Active now</div>
        <div className="val" style={{ color: 'var(--st-running)' }}>{s.by.RUNNING + s.by.RETRYING}

        <div className="spark">{spark.map((h, i) => <i key={i} style={{ height: h + '%' }} />)}</div>

// ------- Workflows view -------

// ------- Metrics view (Grafana-style) -------
function axisLabel(ms, span) {
  const d = new Date(ms);
  const p = (n) => String(n).padStart(2, '0');
  if (span <= 2 * 3600e3) return p(d.getHours()) + ':' + p(d.getMinutes());
  if (span <= 2 * 86400e3) return p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  return d.toLocaleString('en-GB', { day: '2-digit', month: 'short' });
}

function LineChart({ series, height, area, lo, hi, bw, yFmt }) {
  height = height || 120;
  const n = series[0].values.length;
  const W = 1000, H = height, pad = 6;
  const max = Math.max(1, ...series.flatMap((s) => s.values.map((v) => (v == null ? 0 : v))));
  const xy = (v, i) => {
    const x = n <= 1 ? 0 : (i / (n - 1)) * W;
    const y = H - pad - (Math.max(0, v == null ? 0 : v) / max) * (H - pad * 2);
    return [x, y];
  };
  const linePath = (vals) => {
    let started = false, d = '';
    vals.forEach((v, i) => { if (v == null) return; const [x, y] = xy(v, i); d += (started ? 'L' : 'M') + x.toFixed(1) + ' ' + y.toFixed(1) + ' '; started = true; });
    return d.trim();
  };
  const areaPath = (vals) => {
    const lp = linePath(vals); if (!lp) return '';
    const last = xy(vals[n - 1] ?? 0, n - 1), first = xy(vals.find((v) => v != null) ?? 0, vals.findIndex((v) => v != null));
    return lp + ' L' + last[0].toFixed(1) + ' ' + (H - pad) + ' L' + first[0].toFixed(1) + ' ' + (H - pad) + ' Z';
  };
  const grid = [0.25, 0.5, 0.75].map((f) => H - pad - f * (H - pad * 2));
  const ticks = [0, Math.floor((n - 1) / 2), n - 1];
  return (
    <div className="chart">
      <div className="chart-y mono">
        <span>{yFmt ? yFmt(max) : max}</span>
        <span>{yFmt ? yFmt(max / 2) : Math.round(max / 2)}</span>
        <span>0</span>
      </div>
      <div className="chart-main">
        <svg viewBox={'0 0 ' + W + ' ' + H} preserveAspectRatio="none" style={{ width: '100%', height: H }}>
          {grid.map((y, i) => <line key={i} x1="0" x2={W} y1={y} y2={y} className="grid-l" vectorEffect="non-scaling-stroke" />)}
          {area && series.map((s, i) => <path key={'a' + i} d={areaPath(s.values)} fill={s.color} fillOpacity="0.12" stroke="none" />)}
          {series.map((s, i) => <path key={'l' + i} d={linePath(s.values)} fill="none" stroke={s.color} strokeWidth="1.6" vectorEffect="non-scaling-stroke" strokeLinejoin="round" />)}
        </svg>
        <div className="chart-x mono">
          {ticks.map((i) => <span key={i}>{axisLabel(lo + (i + 1) * bw, hi - lo)}</span>)}
        </div>
      </div>
    </div>
  );
}

function Sparkline({ values, color, height }) {
  height = height || 36;
  const n = values.length, W = 200, H = height, max = Math.max(1, ...values);
  const xy = (v, i) => [n <= 1 ? 0 : (i / (n - 1)) * W, H - 2 - (Math.max(0, v) / max) * (H - 4)];
  let d = '', a = '';
  values.forEach((v, i) => { const [x, y] = xy(v, i); d += (i ? 'L' : 'M') + x.toFixed(1) + ' ' + y.toFixed(1) + ' '; });
  if (d) { const l = xy(values[n - 1], n - 1), f = xy(values[0], 0); a = d + 'L' + l[0].toFixed(1) + ' ' + H + ' L' + f[0].toFixed(1) + ' ' + H + ' Z'; }
  return (
    <svg viewBox={'0 0 ' + W + ' ' + H} preserveAspectRatio="none" style={{ width: '100%', height: H, display: 'block' }}>
      <path d={a} fill={color} fillOpacity="0.14" stroke="none" />
      <path d={d.trim()} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke" />
    </svg>
  );
}

function Kpi({ label, value, sub, spark, color }) {
  return (
    <div className="kpi">
      <div className="kpi-l">{label}</div>
      <div className="kpi-v mono" style={{ color }}>{value}{sub && <small> {sub}</small>}</div>
      <div className="kpi-spark"><Sparkline values={spark} color={color} /></div>
    </div>
  );
}

function GPanel({ title, legend, children }) {
  return (
    <div className="gpanel">
      <div className="gpanel-h">
        <span className="gpanel-t">{title}</span>
        {legend && <div className="legend">{legend.map((l) => (
          <span key={l.name} className="lg"><span className="lg-d" style={{ background: l.color }} />{l.name}</span>
        ))}</div>}
      </div>
      {children}
    </div>
  );
}

function MetricsView({ metrics, now }) {
  const m = metrics, TL = window.TLData;
  const C = {
    created: 'var(--st-running)', queue: 'var(--st-retrying)', schedule: 'var(--st-cancelled)',
    exec: 'var(--accent)', completed: 'var(--st-completed)', failed: 'var(--st-failed)',
    started: 'var(--st-running)', success: 'var(--st-completed)', dur: 'var(--accent)',
  };
  return (
    <div style={{ overflow: 'auto', flex: 1 }}>
      <div className="kpis">
        <Kpi label="Workflows created" value={m.cur.created} sub="in range" spark={m.created} color={C.created} />
        <Kpi label="Tasks in queue" value={m.cur.queue} sub="now" spark={m.queue} color={C.queue} />
        <Kpi label="Schedule waiting" value={m.cur.schedule} sub="now" spark={m.schedule} color={C.schedule} />
        <Kpi label="Executing tasks" value={m.cur.executing} sub="now" spark={m.executing} color={C.exec} />
      </div>

      <div className="gpanels">
        <GPanel title="Workflows created / interval">
          <LineChart series={[{ name: 'created', color: C.created, values: m.created }]} area lo={m.lo} hi={m.hi} bw={m.bw} />
        </GPanel>
        <GPanel title="In-flight breakdown"
          legend={[{ name: 'executing', color: C.exec }, { name: 'queue', color: C.queue }, { name: 'schedule', color: C.schedule }]}>
          <LineChart series={[
            { name: 'executing', color: C.exec, values: m.executing },
            { name: 'queue', color: C.queue, values: m.queue },
            { name: 'schedule', color: C.schedule, values: m.schedule },
          ]} lo={m.lo} hi={m.hi} bw={m.bw} />
        </GPanel>
        <GPanel title="Activity throughput"
          legend={[{ name: 'started', color: C.started }, { name: 'completed', color: C.completed }, { name: 'failed', color: C.failed }]}>
          <LineChart series={[
            { name: 'started', color: C.started, values: m.started },
            { name: 'completed', color: C.completed, values: m.completed },
            { name: 'failed', color: C.failed, values: m.failed },
          ]} lo={m.lo} hi={m.hi} bw={m.bw} />
        </GPanel>
        <GPanel title={'Activity success rate · ' + m.cur.successPct + '%'}>
          <LineChart series={[{ name: 'success', color: C.success, values: m.successRate }]} area lo={m.lo} hi={m.hi} bw={m.bw} yFmt={(v) => Math.round(v) + '%'} />
        </GPanel>
        <GPanel title={'Avg activity duration · ' + TL.fmtDuration(Math.round(m.cur.avgDurationMs))}>
          <LineChart series={[{ name: 'dur', color: C.dur, values: m.avgDur }]} area lo={m.lo} hi={m.hi} bw={m.bw} yFmt={(v) => TL.fmtDuration(Math.round(v))} />
        </GPanel>
      </div>
    </div>
  );
}

Object.assign(window, { ActivitiesView, ActivityStats, WorkflowsView, WorkersView, MetricsView, COLS, Pager });

function pageList(page, pages) {
  const cur = page + 1, out = [];
  if (pages <= 7) { for (let i = 1; i <= pages; i++) out.push(i); return out; }
  out.push(1);
  let s = Math.max(2, cur - 1), e = Math.min(pages - 1, cur + 1);
  if (cur <= 3) { s = 2; e = 4; }
  if (cur >= pages - 2) { s = pages - 3; e = pages - 1; }
  if (s > 2) out.push('…');
  for (let i = s; i <= e; i++) out.push(i);
  if (e < pages - 1) out.push('…');
  out.push(pages);
  return out;
}

function Pager({ total, page, pageSize, onPage, onPageSize }) {
  const pages = Math.max(1, Math.ceil(total / pageSize));
  const from = total === 0 ? 0 : page * pageSize + 1;
  const to = Math.min(total, (page + 1) * pageSize);
  const nums = pageList(page, pages);
  return (
    <div className="pager">
      <span className="pg-info">{from}–{to} of {total}</span>
      <div style={{ flex: 1 }}></div>
      <div className="pg-ctrls">
        <button className="pg-btn" disabled={page <= 0} onClick={() => onPage(page - 1)}>‹ Prev</button>
        <div className="pg-pages">
          {nums.map((n, i) => n === '…'
            ? <span key={'e' + i} className="pg-ell">…</span>
            : <button key={n} className={'pg-num' + (n - 1 === page ? ' on' : '')} onClick={() => onPage(n - 1)}>{n}</button>)}
        </div>
        <button className="pg-btn" disabled={page >= pages - 1} onClick={() => onPage(page + 1)}>Next ›</button>
      </div>
      <select className="sel" value={pageSize} onChange={(e) => onPageSize(+e.target.value)}>
        {[10, 12, 20, 50].map((s) => <option key={s} value={s}>{s} / page</option>)}
      </select>
    </div>
  );
}

</script>

  // theme tokens
  useEffect(() => {
    const r = document.documentElement;
    r.setAttribute('data-theme', t.theme);
    r.setAttribute('data-density', t.density);
    if (t.accent && ACCENTS[t.accent]) r.style.setProperty('--accent', ACCENTS[t.accent]);
  }, [t.theme, t.density, t.accent]);

  // live clock + simulation
  useEffect(() => {
    const iv = setInterval(() => {
      setNow(Date.now());
      if (live) {
        const changed = window.TLData.tickSimulation(store);
        if (changed) setTick((x) => x + 1);
      }
    }, Math.max(400, t.pollMs));
    return () => clearInterval(iv);
  }, [live, t.pollMs, store]);

  // derive activities once; group by workflow for progress + modal
  const byId = useMemo(() => {
    const m = {}; store.workflows.forEach((w) => (m[w.id] = w)); return m;
  }, [tick, store]);
  const activities = useMemo(
    () => window.TLData.deriveActivities(store.events, byId),
    [tick, store, byId]
  );

  // facets — distinct types & statuses as if fetched from the backend (not hardcoded)
  const facets = useMemo(() => window.TLData.facets(store), [store, tick]);

  // resolve the active time window [from, to] in ms
  const timeWindow = useMemo(() => {
    const MS = { '1h': 3600e3, '24h': 86400e3, '7d': 7 * 86400e3 };
    if (timePreset === 'custom') {
      return { from: customFrom ? Date.parse(customFrom) : -Infinity, to: customTo ? Date.parse(customTo) : Infinity };
    }
    if (MS[timePreset]) return { from: now - MS[timePreset], to: Infinity };
    return { from: -Infinity, to: Infinity };
  }, [timePreset, customFrom, customTo, now]);

  // workflow filtering
  const workflows = useMemo(() => {
    let xs = store.workflows;
    if (statusSel.length) xs = xs.filter((w) => statusSel.includes(w.status));
    if (typeSel.length) xs = xs.filter((w) => typeSel.includes(w.workflowType));
    if (idQuery.trim()) {
      const q = idQuery.trim().replace(/^#/, '');
      xs = xs.filter((w) => String(w.id).includes(q));
    }
    const { from, to } = timeWindow;
    if (from !== -Infinity || to !== Infinity) {
      xs = xs.filter((w) => { const ts = Date.parse(w.createdAt); return ts >= from && ts <= to; });
    }
    return [...xs].sort((a, b) => Date.parse(b.createdAt) - Date.parse(a.createdAt));
  }, [store.workflows, statusSel, typeSel, idQuery, timeWindow, tick]);

  const totalPages = Math.max(1, Math.ceil(workflows.length / pageSize));
  const safePage = Math.min(page, totalPages - 1);
  const pageWorkflows = useMemo(
    () => workflows.slice(safePage * pageSize, safePage * pageSize + pageSize),
    [workflows, safePage, pageSize]
  );

  // reset to first page when the filtered set changes
  useEffect(() => { setPage(0); }, [idQuery, statusSel, typeSel, timePreset, customFrom, customTo, pageSize]);

  const filtersActive = idQuery || statusSel.length || typeSel.length || timePreset !== 'all';
  const resetFilters = () => {
    setIdQuery(''); setStatusSel([]); setTypeSel([]); setTimePreset('all'); setCustomFrom(''); setCustomTo('');
  };

  const counts = useMemo(() => ({
    workflows: store.workflows.length,
    workers: store.workers.length,
    running: store.workflows.filter((w) => w.status === 'RUNNING').length,
  }), [store, tick]);

  // events for the open workflow
  const openWf = openWfId != null ? byId[openWfId] : null;
  const [openEvents, setOpenEvents] = useState([]);
  useEffect(() => {
    if (openWfId == null) { setOpenEvents([]); return; }
    let alive = true;
    window.TLData.fetchEvents(openWfId).then((evs) => { if (alive) setOpenEvents(evs); });
    return () => { alive = false; };
  }, [openWfId]);

  // metrics over the shared time window, optionally scoped to workflow type(s)
  const metrics = useMemo(
    () => window.TLData.buildMetrics(store, timeWindow.from, timeWindow.to, metricTypes),
    [store, timeWindow, metricTypes, tick]
  );
  const metricsActive = metricTypes.length || timePreset !== 'all';
  const resetMetrics = () => { setMetricTypes([]); setTimePreset('all'); setCustomFrom(''); setCustomTo(''); };

  const NAV = [
    { id: 'workflows', icon: 'workflow', label: 'Workflows', count: counts.workflows },
    { id: 'workers', icon: 'worker', label: 'Workers', count: counts.workers },
    { id: 'metrics', icon: 'chart', label: 'Metrics' },
  ];
  const titles = { workflows: 'Workflows', workers: 'Workers', metrics: 'Metrics' };

  return (
    <div className="app">
      {/* sidebar */}
      <nav className="sidebar">
        <div className="brand">
          <div className="brand-mark"><span>t</span></div>
          <div>
            <div className="brand-name">temporal<b>·lite</b></div>
            <div className="brand-sub">workflow console</div>
          </div>
        </div>
        <div className="nav">
          <div className="nav-label">Observe</div>
          {NAV.map((n) => (
            <div key={n.id} className={'nav-item' + (view === n.id ? ' active' : '')} onClick={() => setView(n.id)}>
              <Ic name={n.icon} size={15} />
              <span>{n.label}</span>
              {n.count != null && <span className="count">{n.count}</span>}
            </div>
          ))}
        </div>
        <div className="sidebar-foot">
          <div>● {counts.running} running</div>
          <div>{store.workflows.length} workflows</div>
          <div className="faint">GET /workflow/api/workflows</div>
        </div>
      </nav>

      {/* main */}
      <main className="main">
        <header className="topbar">
          <h1>{titles[view]}</h1>
          <div className="spacer"></div>
          <div className={'live' + (live ? ' on' : '')} onClick={() => setLive((v) => !v)} title="Toggle live polling">
            <span className="dot"></span>{live ? 'LIVE' : 'PAUSED'}
          </div>
          <div className={'poll' + (live ? '' : ' off')} title="Live refresh interval">
            <span className="poll-l">every</span>
            <input type="range" min={3} max={15} step={1} value={Math.round(Math.max(3000, t.pollMs) / 1000)}
              onChange={(e) => setTweak('pollMs', +e.target.value * 1000)} />
            <span className="poll-v mono">{Math.round(Math.max(3000, t.pollMs) / 1000)}s</span>
          </div>
          <button className="btn" onClick={() => { window.TLData.tickSimulation(store); setTick((x) => x + 1); setNow(Date.now()); }}>
            <Ic name="refresh" size={14} />Refresh
          </button>
        </header>

        {view === 'workflows' && (
          <>
            <div className="toolbar">
              <div className="search" style={{ minWidth: 150 }}>
                <Ic name="search" size={14} />
                <input value={idQuery} onChange={(e) => setIdQuery(e.target.value)} placeholder="workflow id…" />
                {idQuery && <span className="x" style={{ width: 18, height: 18 }} onClick={() => setIdQuery('')}><Ic name="x" size={12} /></span>}
              </div>
              <MultiSelect label="status" options={facets.statuses} selected={statusSel} onChange={setStatusSel}
                dotColors={(s) => window.STATUS_COLOR[s]} />
              <MultiSelect label="type" options={facets.types} selected={typeSel} onChange={setTypeSel} />
              <DateRangePicker preset={timePreset} from={customFrom} to={customTo}
                onPreset={setTimePreset} setFrom={setCustomFrom} setTo={setCustomTo} now={now} />
              <div className="spacer"></div>
              <button className={'btn reset' + (filtersActive ? '' : ' off')} onClick={resetFilters} disabled={!filtersActive}>
                <Ic name="x" size={13} />Reset
              </button>
            </div>
            <WorkflowsView workflows={pageWorkflows} now={now} onOpenWf={setOpenWfId} />
            <Pager total={workflows.length} page={safePage} pageSize={pageSize}
              onPage={setPage} onPageSize={setPageSize} />
          </>
        )}

        {view === 'workers' && <WorkersView workers={store.workers} now={now} />}
        {view === 'metrics' && (
          <>
            <div className="toolbar">
              <MultiSelect label="workflow" options={facets.types} selected={metricTypes} onChange={setMetricTypes} />
              <DateRangePicker preset={timePreset} from={customFrom} to={customTo}
                onPreset={setTimePreset} setFrom={setCustomFrom} setTo={setCustomTo} now={now} />
              <button className={'btn reset' + (metricsActive ? '' : ' off')} onClick={resetMetrics} disabled={!metricsActive}>
                <Ic name="x" size={13} />Reset
              </button>
              <div className="spacer"></div>
              <span className="pg-info mono">{window.TLData.fmtDate(new Date(metrics.lo).toISOString())} → {window.TLData.fmtDate(new Date(metrics.hi).toISOString())}</span>
            </div>
            <MetricsView metrics={metrics} now={now} />
          </>
        )}
      </main>

      {/* workflow modal */}
      {openWf && <WorkflowModal workflow={openWf} events={openEvents} now={now} onClose={() => setOpenWfId(null)} />}

      {/* tweaks */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakSelect label="Palette" value={t.theme} options={['slate', 'carbon', 'terminal', 'midnight']}
          onChange={(v) => setTweak('theme', v)} />
        <TweakColor label="Accent" value={t.accent} options={Object.keys(ACCENTS)} onChange={(v) => setTweak('accent', v)} />
        <TweakRadio label="Density" value={t.density} options={['compact', 'medium', 'ultra']} onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Live" />
        <TweakSlider label="Poll interval" value={t.pollMs} min={3000} max={15000} step={1000} unit="ms" onChange={(v) => setTweak('pollMs', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
